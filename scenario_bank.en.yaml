---
scenario_bank:
- scenario_id: generation_client_followup
  primary_task_type: generation_task
  difficulty: beginner
  vague_request_zh: 帮我写一封客户跟进邮件。
  user_role_zh: 销售负责人
  business_context_zh: 你刚和一个潜在客户开完会，希望推动下一次沟通。
  expected_missing_information:
  - recipient_context
  - meeting_summary
  - followup_goal
  - tone
  - output_format
  - acceptance_criteria
  expected_rewrite_focus_zh: 明确客户背景、上次沟通内容、跟进目标、语气、邮件结构和成功标准。
- scenario_id: extraction_meeting_notes
  primary_task_type: extraction_task
  difficulty: beginner
  vague_request_zh: 帮我整理一下会议纪要。
  user_role_zh: 项目经理
  business_context_zh: 你有一段会议记录，希望提取项目推进信息。
  expected_missing_information:
  - source_material
  - extraction_fields
  - output_structure
  - owner_deadline_fields
  - accuracy_boundary
  expected_rewrite_focus_zh: 明确从会议记录中抽取哪些字段，例如议题、结论、负责人、截止时间和风险。
- scenario_id: comparison_competitor_analysis
  primary_task_type: comparison_task
  secondary_task_types:
  - evaluation_task
  - generation_task
  difficulty: standard
  vague_request_zh: 帮我写一份竞品分析。
  user_role_zh: 产品经理
  business_context_zh: 你需要在周一产品评审会前准备一份内部讨论材料。
  expected_missing_information:
  - competitor_objects
  - source_material
  - comparison_dimensions
  - audience_or_use_case
  - output_format
  - acceptance_criteria
  expected_rewrite_focus_zh: 明确竞品对象、资料来源、分析维度、读者、输出形式和可用标准。
- scenario_id: transformation_sales_copy
  primary_task_type: rewriting_task
  external_alias: transformation_task
  difficulty: standard
  vague_request_zh: 帮我把这段技术介绍改得更适合客户看。
  user_role_zh: 售前顾问
  business_context_zh: 你希望把内部技术语言改成客户能理解的销售材料。
  expected_missing_information:
  - source_content
  - target_audience
  - transformation_goal
  - preserve_rules
  - remove_or_change_rules
  - output_format
  expected_rewrite_focus_zh: 明确原文、目标客户、保留信息、删除信息、语言风格和交付格式。
- scenario_id: evaluation_sales_proposal
  primary_task_type: evaluation_task
  difficulty: advanced
  vague_request_zh: 帮我看看这个方案行不行。
  user_role_zh: 客户项目负责人
  business_context_zh: 你要判断一份方案是否适合发给客户或进入下一轮沟通。
  expected_missing_information:
  - evaluation_object
  - evaluation_criteria
  - target_customer_context
  - risk_boundary
  - scoring_or_priority_rule
  - recommendation_format
  expected_rewrite_focus_zh: 明确评估对象、客户背景、判断标准、风险边界、评分方式和输出建议。
- scenario_id: multi_stage_market_research
  primary_task_type: multistep_task
  external_alias: multi_stage_task
  secondary_task_types:
  - extraction_task
  - comparison_task
  - evaluation_task
  difficulty: advanced
  vague_request_zh: 帮我调研一下这个市场，然后给我一个建议。
  user_role_zh: 创业公司负责人
  business_context_zh: 你需要快速判断一个新市场是否值得进入。
  expected_missing_information:
  - research_scope
  - source_material_or_source_strategy
  - analysis_steps
  - evaluation_criteria
  - intermediate_outputs
  - final_decision_format
  expected_rewrite_focus_zh: 拆成资料收集、信息归类、机会评估、风险判断和行动建议几个阶段。
- scenario_id: ecom_review_reply
  primary_task_type: generation_task
  difficulty: beginner
  industry: 电商/零售
  vague_request_zh: 帮我写一条差评回复。
  user_role_zh: 电商运营
  business_context_zh: 你收到一条商品差评，需要礼貌地回应并挽回顾客。
  expected_missing_information:
  - review_content
  - brand_tone
  - compensation_policy
  - response_goal
  - output_format
  - acceptance_criteria
  expected_rewrite_focus_zh: 明确差评内容、品牌语气、补偿政策和回复目标，给出可执行回复。
- scenario_id: fin_risk_checklist
  primary_task_type: generation_task
  difficulty: beginner
  industry: 金融/保险
  vague_request_zh: 帮我写一份风控合规自查清单。
  user_role_zh: 风控专员
  business_context_zh: 你要在季度自查前整理一份合规检查要点。
  expected_missing_information:
  - business_scope
  - regulation_refs
  - check_dimensions
  - owner_role
  - output_format
  - acceptance_criteria
  expected_rewrite_focus_zh: 明确业务范围、适用法规、检查维度和责任人，形成可执行清单。
- scenario_id: mfg_rootcause_analysis
  primary_task_type: extraction_task
  difficulty: beginner
  industry: 制造/供应链
  vague_request_zh: 帮我整理这条产线的异常根因。
  user_role_zh: 工艺工程师
  business_context_zh: 你有一段产线异常记录，需要提取根因与对策。
  expected_missing_information:
  - source_material
  - anomaly_fields
  - extraction_fields
  - output_structure
  - accuracy_boundary
  expected_rewrite_focus_zh: 明确从异常记录中抽取哪些字段，如现象、根因、责任人与截止时间。
- scenario_id: edu_microcourse_outline
  primary_task_type: generation_task
  difficulty: beginner
  industry: 教育/培训
  vague_request_zh: 帮我设计一门微课大纲。
  user_role_zh: 培训讲师
  business_context_zh: 你需要为一门 15 分钟微课搭出结构。
  expected_missing_information:
  - audience
  - learning_goal
  - lesson_length
  - content_blocks
  - output_format
  - acceptance_criteria
  expected_rewrite_focus_zh: 明确学员、学习目标、时长和内容模块，形成大纲。
- scenario_id: health_faq_gen
  primary_task_type: generation_task
  difficulty: beginner
  industry: 医疗/健康
  vague_request_zh: 帮我写一份患者常见问答。
  user_role_zh: 健康顾问
  business_context_zh: 你要整理患者常问问题的话术。
  expected_missing_information:
  - faq_topics
  - audience
  - tone
  - compliance_note
  - output_format
  - acceptance_criteria
  expected_rewrite_focus_zh: 明确问题主题、读者、语气与合规边界，给出问答。
- scenario_id: media_topic_plan
  primary_task_type: generation_task
  difficulty: beginner
  industry: 媒体/内容
  vague_request_zh: 帮我列一期短视频选题。
  user_role_zh: 内容运营
  business_context_zh: 你需要为一档短视频栏目规划下期选题。
  expected_missing_information:
  - channel_position
  - audience
  - topic_constraints
  - output_format
  - acceptance_criteria
  expected_rewrite_focus_zh: 明确栏目定位、目标观众与选题约束，列出可执行选题。
- scenario_id: ecom_promo_compare
  primary_task_type: comparison_task
  difficulty: standard
  industry: 电商/零售
  vague_request_zh: 帮我对比一下这两套618促销方案，看哪个更值得上。
  user_role_zh: 电商运营
  business_context_zh: 你手里有两个促销玩法，想把预算压到一个上，需要给老板一个对比结论。
  expected_missing_information:
  - promo_plan_a_details
  - promo_plan_b_details
  - comparison_dimensions
  - budget_constraint
  - target_segment
  - decision_criteria
  expected_rewrite_focus_zh: 明确两套方案的玩法、对比维度、预算约束、目标人群和决策标准，输出可比较的表格与结论。
- scenario_id: ecom_launch_eval
  primary_task_type: evaluation_task
  difficulty: advanced
  industry: 电商/零售
  vague_request_zh: 帮我评估下这个新品类上线方案能不能推。
  user_role_zh: 电商负责人
  business_context_zh: 你准备推一个新品类，需要判断上线方案和预期是否合理再报批。
  expected_missing_information:
  - launch_plan
  - category_market_data
  - success_metrics
  - risk_boundary
  - resource_commitment
  - go_no_go_criteria
  expected_rewrite_focus_zh: 明确上线方案、品类市场数据、成功指标、风险边界和资源投入，给出可执行的评估结论。
- scenario_id: fin_product_compare
  primary_task_type: comparison_task
  difficulty: standard
  industry: 金融/保险
  vague_request_zh: 帮我对比两款年金险产品的卖点。
  user_role_zh: 保险顾问
  business_context_zh: 客户在两款产品间犹豫，你需要把差异讲清楚帮他做选择。
  expected_missing_information:
  - product_a_spec
  - product_b_spec
  - client_needs
  - comparison_dimensions
  - compliance_boundary
  - recommendation_format
  expected_rewrite_focus_zh: 明确两款产品条款、客户需求和对比维度，在合规边界内输出对比与建议。
- scenario_id: fin_portfolio_eval
  primary_task_type: evaluation_task
  difficulty: advanced
  industry: 金融/保险
  vague_request_zh: 帮我评估这个客户的投资组合配置合不合理。
  user_role_zh: 理财经理
  business_context_zh: 你要判断客户现有配置是否匹配他的风险偏好与目标，再给调整建议。
  expected_missing_information:
  - portfolio_snapshot
  - risk_profile
  - financial_goal
  - evaluation_criteria
  - rebalance_rules
  - reporting_format
  expected_rewrite_focus_zh: 明确组合持仓、风险偏好、财务目标和评估标准，给出调仓建议与依据。
- scenario_id: mfg_supplier_compare
  primary_task_type: comparison_task
  difficulty: standard
  industry: 制造/供应链
  vague_request_zh: 帮我对比两家供应商的报价和交期。
  user_role_zh: 采购工程师
  business_context_zh: 你需要从两家候选供应商里选定一家，给内部一个对比结论。
