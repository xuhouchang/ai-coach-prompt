  - selection_criteria
  expected_rewrite_focus_zh: 明确两家报价、交期、质量要求和对比维度，输出可比表格与选型建议。
- scenario_id: mfg_capacity_eval
  primary_task_type: evaluation_task
  difficulty: advanced
  industry: 制造/供应链
  vague_request_zh: 帮我评估这条产线扩产能的方案可不可行。
