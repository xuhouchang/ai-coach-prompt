concept_reading_cases:
  - id: read_beginner_detailed_01
    state: concept_read
    learner_route: beginner
    input_context:
      entry_answers:
        q1: 从来没有
        q2: 没用过
        q3_selected:
          - 竞品对象
          - 输出格式
    expected_output:
      must_contain_core_claim: Prompt 的本质是任务定义
      must_contain_rule: AI 不需要再猜，就是可执行
      must_contain_core_slots:
        - task
        - input
        - context
        - output
        - acceptance
      max_full_business_examples: 1
      max_chinese_chars: 1200
      read_depth: detailed
      next_action_type: start_practice
    forbidden:
      - more_than_one_full_business_case
      - arrow_flowchart_for_core_slots
      - external_skill_reference
      - github_link
    notes: 初学者可以解释稍多，但不能变成长教材。

  - id: read_standard_normal_01
    state: concept_read
    learner_route: standard
    input_context:
      entry_answers:
        q1: 偶尔写
        q2: 用过一点
        q3_selected:
          - 竞品对象
          - 输入材料
          - 分析维度
          - 输出格式
    expected_output:
      must_contain_core_claim: Prompt 的本质是任务定义
      must_contain_core_slots:
        - task
        - input
        - context
        - output
        - acceptance
      max_full_business_examples: 1
      max_chinese_chars: 900
      read_depth: normal
      next_action_type: start_practice
    forbidden:
      - long_article_style
      - five_independent_scenarios
      - flowchart_for_parallel_slots

  - id: read_advanced_concise_01
    state: concept_read
    learner_route: advanced
    input_context:
      entry_answers:
        q1: 经常写
        q2: 经常用
        q3_selected:
          - 竞品对象
          - 输入材料
          - 分析维度
          - 业务用途
          - 输出格式
          - 验收标准
    expected_output:
      must_contain_core_claim: Prompt 的本质是任务定义
      must_contain_rule: AI 不需要再猜，就是可执行
      max_chinese_chars: 650
      read_depth: concise
      next_action_type: start_practice
    forbidden:
      - beginner_tutorial_tone
      - repeated_basic_definitions
      - external_visual_backend_explanation

  - id: read_skip_request_01
    state: concept_read
    learner_route: standard
    user_message: 我已经知道什么是 Prompt，直接开始练习吧。
    expected_behavior:
      allow_skip: true
      must_show_minimal_recap: true
      minimal_recap_max_chinese_chars: 180
      next_state: practice_rewrite_round_1
    forbidden:
      - force_full_reading
      - start_scoring_without_exercise

  - id: read_visual_policy_01
    state: concept_read
    learner_route: standard
    expected_visual_policy:
      core_slots_are_parallel_check_items: true
      allowed_displays:
        - checklist
        - simple_table
        - static_cards
      forbidden_displays:
        - arrow_flowchart
        - causal_chain
        - sequential_process_diagram
    expected_short_labels_zh:
      - 做什么
      - 基于什么
      - 给谁用
      - 交付什么
      - 怎样算好
