state_flow_cases:
  - id: flow_beginner_generation_complete_01
    description: 初学者从阅读到生成型任务二轮完成。
    entry_answers:
      q1: 从来没有
      q2: 没用过
      q3_selected:
        - 竞品对象
        - 输出格式
    expected_route: beginner
    primary_scenario_id: generation_client_followup
    steps:
      - state: concept_read
        expected_next_state: practice_rewrite_round_1
      - state: practice_rewrite_round_1
        user_answer_zh: |
          这是一个生成型任务。
          缺失信息：客户是谁、上次聊了什么、这封邮件想达成什么、语气和格式。
          改写后的 Prompt：
          请基于我提供的上次会议纪要，写一封给客户负责人的跟进邮件。邮件目标是推动下一次需求澄清会。语气专业简洁，结构包含感谢、会议回顾、下一步建议。控制在 300 字以内。
        expected_score_range: 75-90
        expected_retry_mode: targeted_improvement
        expected_failure_patterns_may_include:
          - missing_acceptance_criteria
      - state: practice_rewrite_round_2
        user_answer_zh: |
          修订任务类型：生成型任务。
          修订缺失信息：收件人、上次会议摘要、跟进目标、语气、邮件结构、验收标准。
          最终 Prompt：
          请基于我提供的上次客户会议摘要，写一封发给客户负责人的跟进邮件。
          邮件目标是确认客户是否愿意安排下一次 30 分钟需求澄清会议。
          语气专业、简洁，不要过度销售。
          结构包括：开场感谢、上次沟通要点回顾、我们理解的客户需求、下一步会议建议。
          控制在 300 字以内，结果需要能直接复制到邮件里发送。
          修改说明：补充了明确的会议目标和可直接发送的验收标准。
        expected_final_score_range: 88-100
        expected_next_state: completion

  - id: flow_standard_comparison_complete_01
    description: 标准用户完成竞品对比任务。
    entry_answers:
      q1: 偶尔写
      q2: 用过一点
      q3_selected:
        - 竞品对象
        - 输入材料
        - 分析维度
        - 输出格式
    expected_route: standard
    primary_scenario_id: comparison_competitor_analysis
    steps:
      - state: concept_read
        expected_read_depth: normal
      - state: practice_rewrite_round_1
        user_answer_zh: |
          主任务类型：对比型任务。
          缺失信息：竞品对象、输入材料、分析维度、读者对象、输出格式、验收标准。
          改写后的 Prompt：
          请基于我提供的三个竞品官网资料，生成一份面向周一产品评审会的一页竞品对比分析。
          请用表格对比它们在目标用户、核心功能、价格策略、主要卖点和潜在风险上的差异。
          最后用 3 条要点总结我们产品可以借鉴的方向。
          不要展开行业背景，不要写成市场研究报告。
          结果应控制在 800 字以内，能直接用于产品团队讨论下一版功能优先级。
        expected_score_range: 90-100
        expected_retry_mode: template_optimization
      - state: practice_rewrite_round_2
        user_answer_zh: |
          修订任务类型：对比型任务，次任务类型为评估型任务。
          修订缺失信息：竞品对象、输入材料、比较维度、使用场景、输出格式、验收标准。
          最终 Prompt：
          请基于我提供的 A/B/C 三个竞品官网资料，输出一页内部竞品对比材料，用于周一产品评审会。
          请用表格对比：目标用户、核心功能、价格策略、主要卖点、潜在风险。
          表格后给出 3 条可讨论的产品借鉴方向，每条说明依据来自哪个比较维度。
          不要展开行业背景，不要写成完整市场报告。
          总字数控制在 800 字以内，结果需要能直接支持产品团队讨论下一版功能优先级。
          修改说明：把竞品名称模板化，并补充建议必须对应比较维度。
        expected_final_score_range: 92-100
        expected_next_state: completion

  - id: flow_advanced_multistage_complete_01
    description: 高阶用户完成多步骤市场调研任务。
    entry_answers:
      q1: 经常写
      q2: 经常用
      q3_selected:
        - 竞品对象
        - 输入材料
        - 分析维度
        - 业务用途
        - 输出格式
        - 验收标准
    expected_route: advanced
    primary_scenario_id: multi_stage_market_research
    steps:
      - state: concept_read
        expected_read_depth: concise
      - state: practice_rewrite_round_1
        user_answer_zh: |
          主任务类型：多步骤任务，包含抽取、对比、评估。
          缺失信息：调研范围、资料来源、分析步骤、评估标准、中间产出、最终建议格式。
          改写后的 Prompt：
          请基于我提供的行业报告、竞品官网和用户访谈摘要，判断这个新市场是否值得进入。
          请按 4 步输出：1）提取市场规模、增长、用户痛点和主要玩家；2）对比 3 个主要竞品的定位、价格和渠道；3）按进入难度、潜在收益、资源匹配度、风险四个维度评分；4）给出进入 / 暂缓 / 放弃的建议。
          输出为一页决策备忘录，包含关键事实表、评分表、结论和 3 条下一步动作。
          不要引用未提供资料之外的具体数字；不确定处标注“需补充验证”。
        expected_score_range: 85-96
        expected_retry_mode: targeted_improvement
      - state: practice_rewrite_round_2
        user_answer_zh: |
          修订任务类型：多步骤任务，包含抽取、对比、评估和建议生成。
          修订缺失信息：调研范围、资料来源、分析步骤、评估标准、中间产出、最终建议格式、风险边界。
          最终 Prompt：
          请基于我提供的行业报告、竞品官网截图、价格页和 5 份用户访谈摘要，判断【目标市场】是否值得进入。
          请按 4 步处理：
          1. 从材料中提取市场规模、增长信号、用户痛点、主要玩家和渠道特征；
          2. 对比 3 个主要竞品的定位、价格、获客渠道和差异化卖点；
          3. 按进入难度、潜在收益、资源匹配度、合规/执行风险四个维度打分，每项 1-5 分并说明依据；
          4. 给出“进入 / 暂缓 / 放弃”的建议，并列出 3 条下一步验证动作。
          输出为一页决策备忘录，包含关键事实表、竞品对比表、评分表、最终建议。
          不要引用未提供资料之外的具体数字；无法确认的信息标注“需补充验证”。
          结果需要支持创始团队判断是否投入 2 周做进一步验证。
          修改说明：补充了输入材料范围、评分口径和最终业务决策用途。
        expected_final_score_range: 92-100
  - id: flow_beginner_with_myth_diagnosis_01
    description: 初学者完成玄学诊断后进入正式训练。
    entry_answers:
      q1: 从来没有
      q2: 没用过
      q3_selected:
        - 竞品对象
    expected_route: beginner
    primary_scenario_id: generation_client_followup
    steps:
      - state: myth_diagnosis
        user_answer_zh: |
          第一步：B、D是不可执行的。A有具体任务，C有目标和输出格式。坏Prompt中，“资深商业顾问”是空泛角色，“深吸一口气”是仪式词，“第一性原理”是假框架，“全面深入”是万能词。
          第二步：替换完成。改写：“请分析这个项目的优劣势。输出格式为Markdown表格。最后给出是否值得投资的结论。”
        expected_myth_diagnosis_result:
          recognizes_ritual_prompt: true
          recognizes_empty_role_prompt: true
          recognizes_generic_quality_words: true
          recognizes_unexpanded_framework: true
          can_rewrite_myth_into_structure: true
        expected_next_state: concept_read
      - state: concept_read
        expected_next_state: practice_rewrite_round_1
