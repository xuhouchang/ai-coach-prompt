---
test_suite: module0_myth_cases
description: |
  Test cases for Module 0 — Prompt Myth Detector.
  Validates hit accuracy, false-positive rate, and replacement suggestion correctness.
canonical_language: en
primary_locale: zh-CN
test_cases:
  - id: myth_001
    description: 检测"深呼吸"类仪式型玄学
    input_prompt: "你是一个资深顾问，请深吸一口气，一步一步认真思考，帮我分析一下这个市场。"
    expected_hits:
      - fragment: "深吸一口气"
        myth_type: ritual
      - fragment: "一步一步认真思考"
        myth_type: ritual
      - fragment: "资深顾问"
        myth_type: empty_role
    expected_no_hit:
      - "帮我分析一下这个市场"

  - id: myth_002
    description: 检测"顶级专家"类空泛角色
    input_prompt: "你是一个世界顶级的 AI 专家，请帮我写一份方案。"
    expected_hits:
      - fragment: "你是一个世界顶级的 AI 专家"
        myth_type: empty_role
    expected_no_hit:
      - "请帮我写一份方案"

  - id: myth_003
    description: 检测"这很重要"类重要性强调
    input_prompt: "这非常重要，请务必认真对待，这是公司的关键任务。"
    expected_hits:
      - fragment: "这非常重要"
        myth_type: importance_emphasis
      - fragment: "请务必认真对待"
        myth_type: importance_emphasis
      - fragment: "关键任务"
        myth_type: importance_emphasis

  - id: myth_004
    description: 检测"给小费"类利诱型玄学
    input_prompt: "给你小费，请帮我认真写一下这个报告，谢谢，请你喝咖啡。"
    expected_hits:
      - fragment: "给你小费"
        myth_type: bribery
      - fragment: "请你喝咖啡"
        myth_type: bribery

  - id: myth_005
    description: 检测"第一性原理"类假逻辑框架
    input_prompt: "请用第一性原理帮我分析，结合苏格拉底提问法。"
    expected_hits:
      - fragment: "第一性原理"
        myth_type: fake_framework
      - fragment: "苏格拉底提问法"
        myth_type: fake_framework

  - id: myth_006
    description: 检测"万能质量词"堆砌
    input_prompt: "请全面、深入、专业、详细地分析这三家竞品。"
    expected_hits:
      - fragment: "全面、深入、专业、详细"
        myth_type: quality_padding

  - id: myth_007
    description: 组合玄学——含多种类型
    input_prompt: "你是一个资深商业顾问，请深吸一口气，充分思考，用第一性原理，全面、深入、专业地帮我分析一下这个项目，这很重要，谢谢你，给你小费。"
    expected_hits:
      - fragment: "你是一个资深商业顾问"
        myth_type: empty_role
      - fragment: "深吸一口气"
        myth_type: ritual
      - fragment: "充分思考"
        myth_type: ritual
      - fragment: "第一性原理"
        myth_type: fake_framework
      - fragment: "全面、深入、专业"
        myth_type: quality_padding
      - fragment: "这很重要"
        myth_type: importance_emphasis
      - fragment: "给你小费"
        myth_type: bribery

  - id: myth_008
    description: 正常 Prompt 不应出现误报
    input_prompt: "请基于上周的销售数据，生成一份周报，包含销售额、新增客户数、流失客户数三个指标，用表格呈现，结论用 3 条 bullet points 概括。这份报告用于周一早会汇报。"
    expected_no_hits: true

  - id: myth_009
    description: 替换建议正确性——仪式型应映射到任务步骤
    input_prompt: "请深吸一口气，认真思考后回答。"
    expected_hits:
      - fragment: "深吸一口气"
        myth_type: ritual
        replacement_slot: task_clarity
    check_replacement_contains: "步骤"  # 替换应包含具体的步骤描述

  - id: myth_010
    description: 替换建议正确性——空泛角色应映射到上下文
    input_prompt: "你是一个专家。"
    expected_hits:
      - fragment: "你是一个专家"
        myth_type: empty_role
        replacement_slot: context_completion
    check_replacement_contains: "受众"  # 替换应包含受众/场景
