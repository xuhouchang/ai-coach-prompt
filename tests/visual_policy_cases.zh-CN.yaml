visual_policy_cases:
  - id: visual_core_slots_parallel_01
    content_type: core_slot_framework
    slot_labels_zh:
      - 做什么
      - 基于什么
      - 给谁用
      - 交付什么
      - 怎样算好
    expected_semantic_relation: parallel_check_items
    allowed_rendering:
      - checklist
      - simple_table
      - static_cards
    forbidden_rendering:
      - arrow_flowchart
      - causal_chain
      - sequential_process_diagram
      - mermaid_flowchart
    expected_behavior_if_renderer_uncertain: use_markdown_checklist

  - id: visual_process_allowed_for_state_flow_01
    content_type: learning_state_flow
    states:
      - concept_read
      - practice_rewrite_round_1
      - scoring_feedback
      - retry
      - completion
    expected_semantic_relation: sequential_steps
    allowed_rendering:
      - text_steps
      - flowchart
    note: 状态流可以画流程图；五槽位不能画流程图。

  - id: visual_card_label_length_01
    content_type: core_slot_framework
    expected_short_label_max_zh_chars: 6
    invalid_labels:
      - AI基于什么材料来完成任务
      - 什么样的结果才算达标
    expected_behavior: shorten_to_short_labels
