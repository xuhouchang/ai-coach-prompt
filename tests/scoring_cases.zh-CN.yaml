test_cases:
  - id: case_comparison_bad_01
    scenario_id: comparison_competitor_analysis
    user_answer_zh: |
      这是一个生成型任务。请帮我写一份竞品分析，内容要详细一点，可以用于开会。
    expected_failure_patterns:
      - wrong_task_type
      - missing_task_object
      - missing_source_material
      - missing_task_specific_variables
      - missing_output_contract
      - missing_acceptance_criteria
    expected_score_range: 30-50
  - id: case_comparison_partial_01
    scenario_id: comparison_competitor_analysis
    user_answer_zh: |
      这是一个对比型任务。
      缺少竞品对象、分析维度、输出格式和读者对象。
      请基于三个竞品的官网资料，写一份给产品团队看的竞品分析，对比功能、价格和卖点，用表格输出。
    expected_failure_patterns:
      - missing_acceptance_criteria
    expected_score_range: 65-80
  - id: case_comparison_good_01
    scenario_id: comparison_competitor_analysis
    user_answer_zh: |
      主任务类型：对比型任务。次任务类型：评估型任务。
      缺失信息：竞品对象、输入材料、分析维度、读者对象、输出格式、验收标准。
      改写后的 Prompt:
      请基于我提供的三个竞品官网资料，生成一份面向周一产品评审会的一页竞品对比分析。
      请用表格对比它们在目标用户、核心功能、价格策略、主要卖点和潜在风险上的差异。
      最后用 3 条要点总结我们产品可以借鉴的方向。
      不要展开行业背景，不要写成市场研究报告。
      结果应控制在 800 字以内，能直接用于产品团队讨论下一版功能优先级。
    expected_failure_patterns: []
    expected_score_range: 90-100
    expected_retry_mode: template_optimization
  - id: case_generation_good_01
    scenario_id: generation_client_followup
    user_answer_zh: |
      主任务类型：生成型任务。
      缺失信息：收件人、上次沟通内容、跟进目标、语气、邮件结构、验收标准。
      改写后的 Prompt:
      请基于我提供的上次客户会议摘要，写一封发给客户负责人的跟进邮件。
      邮件目标是确认客户是否愿意安排下一次需求澄清会议。
      语气专业、简洁，不要过度销售。
      结构包括：开场感谢、上次沟通要点回顾、我们理解的客户需求、下一步会议建议。
      控制在 300 字以内，结果需要能直接复制到邮件里发送。
    expected_failure_patterns: []
    expected_score_range: 88-100
  - id: case_evaluation_partial_01
    scenario_id: evaluation_sales_proposal
    user_answer_zh: |
      这是一个评估型任务。
      请帮我评估这份方案是否适合发给客户，输出修改建议。
    expected_failure_patterns:
      - missing_source_material
      - missing_task_specific_variables
      - missing_audience_or_use_case
      - missing_output_contract
    expected_score_range: 45-65
  - id: case_bad_ritual_prompt
    scenario_id: comparison_competitor_analysis
    user_answer_zh: |
      这是一个对比型任务。请深吸一口气，一步一步认真思考，帮我写一份给老板看的竞品分析。
    expected_failure_patterns:
      - ritual_prompt_used
      - missing_task_specific_variables
    expected_score_range: 35-60
  - id: case_bad_empty_role
    scenario_id: generation_client_followup
    user_answer_zh: |
      生成型任务。你是一个资深销售专家，请帮我给客户写一封邮件，要非常专业。
    expected_failure_patterns:
      - empty_role_prompt_used
      - missing_source_material
    expected_score_range: 40-60
  - id: case_bad_magic_words
    scenario_id: evaluation_sales_proposal
    user_answer_zh: |
      评估型任务。请基于公司的预算，全面、深入、专业、详细地评估这份方案，不要遗漏任何细节。
    expected_failure_patterns:
      - magic_quality_words_used
      - missing_task_specific_variables
    expected_score_range: 40-60
  - id: case_bad_fake_framework
    scenario_id: comparison_competitor_analysis
    user_answer_zh: |
      对比任务。请用苏格拉底法和第一性原理，帮我深度分析这三个竞品。
    expected_failure_patterns:
      - fake_logic_framework_used
      - missing_task_specific_variables
    expected_score_range: 40-60
  - id: case_good_socratic
    scenario_id: multi_stage_market_research
    user_answer_zh: |
      多步骤任务。请基于我提供的用户访谈、竞品资料和行业数据，完成一份面向创始团队的下沉市场调研。
      先用苏格拉底式澄清法提出最多 3 个会影响结论的问题；若无法回答，明确采用“目标是寻找下沉市场”的默认假设。
      调研范围覆盖目标用户、竞品、渠道和风险；按“资料来源 → 分析步骤 → 中间产出 → 最终建议格式”依次输出。
      请用一页报告呈现，并按市场机会、验证成本、主要风险三个评估标准给出结论。
      结果需要能直接用于创始团队判断是否投入下一轮验证。
    expected_failure_patterns: []
    expected_score_range: 85-100
  - id: case_good_output_contract
    scenario_id: transformation_sales_copy
    user_answer_zh: |
      改写型任务。请基于我提供的内部技术介绍原文，把这段技术说明改写成面向目标客户采购负责人的销售话术。
      保留可验证的产品能力，删掉内部实现细节和技术术语；改写目标是促成售前会议。
      使用输出契约法：必须是 3 段式结构，第一段痛点，第二段方案，第三段行动号召；控制在 150 字以内。
      结果需要能直接复制到客户跟进邮件中发送。
    expected_failure_patterns: []
    expected_score_range: 85-100
  - id: case_good_acceptance
    scenario_id: extraction_meeting_notes
    user_answer_zh: |
      抽取型任务。请基于我提供的会议记录，抽取本周冲刺计划所需的行动项。
      抽取字段包括负责人、截止时间、行动内容和依赖项；不确定的信息标注“待确认”，不要编造。
      请用表格输出，按负责人分组，并在最后列出阻塞项。
      使用验收标准倒推法：结果将发给全体研发人员，必须能直接用于本周排期；每个行动项都要有明确负责人和 DDL，否则算不可用。
    expected_failure_patterns: []
    expected_score_range: 85-100
