transfer_cases:
  - id: transfer_eval_from_comparison_01
    learner_route: standard
    primary_scenario_id: comparison_competitor_analysis
    transfer_prompt_zh: 帮我看看这个方案行不行。
    expected_primary_task_type: evaluation_task
    expected_missing_information:
      - evaluation_object
      - evaluation_criteria
      - target_customer_context
      - risk_boundary
      - scoring_or_priority_rule
      - recommendation_format
    pass_condition:
      - task_type_selection_is_plausible == true
      - missing_information_count >= 4
      - transfer_task_type_differs_from_primary == true
  - id: transfer_comparison_from_beginner_01
    learner_route: beginner
    primary_scenario_id: generation_client_followup
    transfer_prompt_zh: 帮我写一份竞品分析。
    expected_primary_task_type: comparison_task
    expected_missing_information:
      - competitor_objects
      - source_material
      - comparison_dimensions
      - audience_or_use_case
      - output_format
      - acceptance_criteria
    pass_condition:
      - task_type_selection_is_plausible == true
      - missing_information_count >= 4
      - transfer_task_type_differs_from_primary == true
