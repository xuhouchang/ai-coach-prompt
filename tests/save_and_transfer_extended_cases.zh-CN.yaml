save_and_transfer_extended_cases:
  - id: completion_without_transfer_allowed_if_policy_light_01
    policy_variant: light_l1_completion
    final_score_after_retry: 86
    retry_completed: true
    transfer_check_completed: false
    expected_l1_completion_allowed: true
    expected_template_save_allowed: false
    note: 如果采用轻量 L1，完成训练不强制迁移检查；保存模板仍需要迁移检查。

  - id: current_policy_save_requires_transfer_01
    policy_variant: current_framework
    final_score_after_retry: 86
    retry_completed: true
    transfer_check_completed: false
    required_components_present: true
    no_high_severity_failure_patterns: true
    expected_save_allowed: false
    expected_reason: transfer_check_required

  - id: transfer_wrong_same_type_01
    learner_route: standard
    primary_scenario_id: comparison_competitor_analysis
    transfer_prompt_zh: 再帮我写一个竞品分析。
    expected_behavior:
      transfer_task_type_differs_from_primary: false
      transfer_pass: false
      feedback_contains: 迁移检查需要换一种任务结构

  - id: transfer_good_rewriting_from_comparison_01
    learner_route: standard
    primary_scenario_id: comparison_competitor_analysis
    transfer_prompt_zh: 帮我把这段技术介绍改得更适合客户看。
    expected_primary_task_type: rewriting_task
    expected_missing_information:
      - source_content
      - target_audience
      - transformation_goal
      - preserve_rules
      - remove_or_change_rules
      - output_format
    pass_condition:
      - task_type_selection_is_plausible == true
      - missing_information_count >= 4
      - transfer_task_type_differs_from_primary == true
