---
exercise:
  exercise_type: routed_task_with_transfer_check
  primary_exercise_count: 1
  transfer_check_count: 1
  max_rounds: 2
  primary_task_steps:
  - step_id: diagnose_task_type
    instruction_zh: 先判断这个需求属于哪一类任务。可选：抽取型、对比型、评估型、生成型、改写型、多步骤任务。允许选择一个主类型和一个次类型。
    expected_output_type: task_type_selection
  - step_id: identify_missing_information
    instruction_zh: 指出这个需求缺少哪些关键信息。至少列出 4 项。
    expected_output_type: missing_information_list
  - step_id: rewrite_prompt
    instruction_zh: 把这句话改写成 WorkBuddy 可以直接执行的 Prompt。要求包含任务、输入、背景、输出和验收标准。
    expected_output_type: rewritten_prompt
  transfer_check_steps:
  - step_id: transfer_diagnosis
    instruction_zh: 下面会给你另一个不同类型的模糊需求。你不需要完整改写，只需要判断任务类型，并列出至少 4 个缺失变量。
    expected_output_type:
    - task_type_selection
    - missing_information_list
  exercise_selection: &1
    beginner:
      primary_pool:
      - generation_client_followup
      - extraction_meeting_notes
      transfer_pool:
      - comparison_competitor_analysis
    standard:
      primary_pool:
      - comparison_competitor_analysis
      - transformation_sales_copy
      transfer_pool:
      - extraction_meeting_notes
      - evaluation_sales_proposal
    advanced:
      primary_pool:
      - evaluation_sales_proposal
      - multi_stage_market_research
      transfer_pool:
      - comparison_competitor_analysis
      - transformation_sales_copy
    selection_rule: Select one primary scenario based on route. Select one transfer-check
      scenario with a different primary task type.
  round_2_submission_schema: &2
    required: true
    fields:
    - id: revised_task_type_selection
      label_zh: 修订后的任务类型判断
      type: structured_selection
      required: true
      instruction_zh: 如果第一轮判断正确，可以保留原判断，但需要再次确认。若第一轮被指出任务类型判断错误，必须修正。
    - id: revised_missing_information_list
      label_zh: 修订后的缺失信息清单
      type: list
      required: true
      min_items: 4
      instruction_zh: 请重新列出这个任务要成立所需的关键变量。不要只写“背景不够”。
    - id: final_rewritten_prompt
      label_zh: 第二轮最终 Prompt
      type: long_text
      required: true
      instruction_zh: 请提交第二轮最终版本，包含任务、输入、背景、输出和验收标准。
    - id: revision_note
      label_zh: 本轮修改说明
      type: short_text
      required: true
      instruction_zh: 用一句话说明你这轮主要修复或优化了什么。
exercise_selection: *1
round_2_submission_schema: *2
