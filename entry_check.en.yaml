---
entry_check:
  entry_questions:
  - id: q1
    type: single_choice
    question_zh: 你之前是否经常自己写 Prompt？
    options_zh:
    - 从来没有
    - 偶尔写
    - 经常写
  - id: q2
    type: single_choice
    question_zh: 你是否用过 WorkBuddy 做真实任务？
    options_zh:
    - 没用过
    - 用过一点
    - 经常用
  - id: q3
    type: multi_choice
    question_zh: 下面这句话缺少哪些关键信息？「帮我写一份竞品分析。」
    options_zh:
    - 竞品对象
    - 输入材料
    - 分析维度
    - 业务用途
    - 输出格式
    - 验收标准
  - id: q4
    type: single_choice
    question_zh: 你主要在哪个行业或领域工作？
    options_zh:
    - 互联网/软件
    - 电商/零售
    - 金融/保险
    - 制造/供应链
    - 教育/培训
    - 医疗/健康
    - 媒体/内容
    - 其他
  - id: q5
    type: single_choice
    question_zh: 你日常用 AI 工具最常做哪类事？
    options_zh:
    - 写文案/内容
    - 做数据分析
    - 写代码
    - 客户沟通
    - 做方案/报告
    - 其他
  - id: q6
    type: multi_choice
    question_zh: 你最想通过训练提升哪方面？
    options_zh:
    - 把模糊需求写清楚
    - 让 AI 输出更稳定
    - 减少返工
    - 适配我的业务场景
    - 学会复用模板
  - id: q7
    type: single_choice
    question_zh: 练习场景你更偏好哪种？
    options_zh:
    - 贴近我的行业场景
    - 通用经典场景
    - 听你安排
  routing_rule:
    beginner_if:
    - q1 == '从来没有'
    - q2 == '没用过'
    - selected_count(q3) <= 3
    standard_if:
    - q1 == '偶尔写'
    - selected_count(q3) >= 4
    advanced_if:
    - q1 == '经常写'
    - q2 == '经常用'
    - selected_count(q3) >= 5
    conflict_resolution:
    - when_self_report_and_tool_experience_conflict_use_q3_as_tie_breaker
    - if_no_rule_matches_fallback_to_standard
  fail_route:
    recommended_skill: skill_prompt_l0_basics
    message_zh: 如果你对任务类型和关键槽位几乎没有概念，建议先回到 L0 基础单元建立 Prompt 槽位意识。
