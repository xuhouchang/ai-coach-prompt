---
agent_loop_policy:
  purpose: Constrain the skill-internal self-check loop before returning one learner-visible
    turn.
  max_internal_iterations_default: 3
  expose_chain_of_thought: false
  allowed_observable_metadata:
  - loop_iterations
  - stop_reason
  - unresolved_blockers
  - user_question_required
  core_rules:
  - score_original_user_submission_before_any_rewrite
  - rewrite_advice_only_after_scoring
  - ask_user_only_when_missing_information_blocks_execution
  - use_placeholders_when_information_can_be_safely_deferred
  - stop_when_score_band_no_longer_improves_or_max_iterations_reached
  blocking_input_rules:
    uploaded_material_missing:
      stop_reason: blocking_input_missing
      user_question_required: true
      unresolved_blockers:
      - missing_source_material
      may_provide_template_skeleton: true
      forbidden:
      - pretend_attachment_exists
      - evaluate_specific_document_content_without_source
  mode_overrides:
    concept_read:
      max_loop_iterations: 1
      stop_reason: direct_explanation_sufficient
      user_question_required: false
    practice_rewrite_round_1:
      max_loop_iterations: 2
    practice_rewrite_round_2:
      max_loop_iterations: 2
    transfer_check:
      max_loop_iterations: 2
