---
retry_policy:
  type: conditional_learning_retry
  max_rounds: 2
  min_rounds: 1
  round_1_score_rules:
  - condition: total_score >= 90
    retry_mode: optional_template_optimization
    localized_instruction_zh: 这版已经可用。你可以直接进入迁移练习或完成；如果想继续打磨，再把它压缩成可复用模板。
  - condition: total_score >= 75 and total_score < 90
    retry_mode: targeted_improvement
    localized_instruction_zh: 你的第一版已经基本可执行。第二轮请修复系统指出的 1-2 个关键缺口，让 WorkBuddy 少猜一步。
  - condition: total_score < 75
    retry_mode: repair_retry
    localized_instruction_zh: 你的第一版还需要 WorkBuddy 猜测关键变量。请先修复上面最关键的 1-2 处，再提交下一版。
high_severity_override:
  condition: any_high_severity_failure_pattern_present == true
  retry_mode: repair_retry
  overrides_score_rules: true
  localized_instruction_zh: 你的第一版里有会直接影响执行的高危问题（如指令互相冲突、缺任务对象/输入/关键变量），请先修复，再提交下一版。
retry_focus_selection:
  priority_order:
  - missing_source_material
  - missing_task_specific_variables
  - missing_task_object
  - conflicting_instructions
  - missing_acceptance_criteria
  - missing_output_contract
  - missing_audience_or_use_case
  - wrong_task_type
  - overexpanded_without_structure
  max_focus_items:
    beginner: 2
    standard: 2
    advanced: 3
round_2_submission_requirements:
  required_fields:
  - revised_task_type_selection
  - revised_missing_information_list
  - final_rewritten_prompt
  - revision_note
  scoring_rule: Round 2 is scored independently. No Round 1 dimension score carries
    over.
  incomplete_submission_behavior: ask_for_missing_round_2_fields_before_scoring
