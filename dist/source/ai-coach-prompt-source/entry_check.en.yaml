entry_check:
  purpose_zh: 用四个短问题建立个性化路线，不要求用户先写长 Prompt。
  entry_questions:
  - id: q1
    type: single_choice
    question_zh: 你现在使用 AI 的熟练度更接近哪种？
    options_zh:
    - 刚开始使用
    - 偶尔用于工作
    - 经常使用
  - id: q2
    type: single_choice
    question_zh: 你最常让 AI 帮你做什么？
    options_zh:
    - 写内容或沟通材料
    - 分析、对比或评估
    - 整理资料或提取信息
    - 完成多步骤工作
  - id: q3
    type: single_choice
    question_zh: 你的工作主要属于哪个行业大类？
    options_zh:
    - 数字产品与互联网
    - 商业与金融
    - 实体产业与专业服务
    - 内容及其他
    follow_up_by_option:
      数字产品与互联网:
        resolved_industry: 互联网/软件
      商业与金融:
        id: q3_detail_business_finance
        type: single_choice
        question_zh: 请选择更贴近你的行业：
        options_zh:
        - 电商/零售
        - 金融/保险
      实体产业与专业服务:
        id: q3_detail_industry_service
        type: single_choice
        question_zh: 请选择更贴近你的行业：
        options_zh:
        - 制造/供应链
        - 教育/培训
        - 医疗/健康
        - 其他专业服务
      内容及其他:
        id: q3_detail_content_other
        type: single_choice
        question_zh: 请选择更贴近你的行业：
        options_zh:
        - 媒体/内容
        - 其他
  - id: q4
    type: multi_choice
    question_zh: 这次训练你最想解决哪些问题？
    options_zh:
    - 需求经常说不清
    - 输出不稳定、返工多
    - 不知道该补哪些信息
    - 想沉淀可复用模板
  profile_fields:
  - ai_fluency
  - frequent_task_family
  - industry
  - learning_goals
  text_nonblocking_interaction_rule:
    mode: text_nonblocking
    native_question_panels_enabled: false
    max_options_per_control: 4
    hierarchical_question_ids:
    - q3
    render_as: numbered_plain_text
    input_hint_zh: 直接回复数字或对应文字。
