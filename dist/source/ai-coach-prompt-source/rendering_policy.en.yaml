rendering_policy:
  principle_zh: 可视化能力由当前会话实际可用工具决定，不根据宿主名称猜测。
  course_map:
    priority:
    - generated_or_previewable_html
    - mermaid
    - markdown
    html_asset: locales/zh-CN/course_map_widget.html
    mermaid_asset: locales/zh-CN/course_map_mermaid.md
    markdown_asset: locales/zh-CN/course_map.md
  assessment_report:
    priority:
    - rendered_self_contained_html
    - markdown_report_with_score_bars
    html_renderer_command: python3 scripts/render_prompt_report.py --input <assessment.json>
      --output <report.html>
    html_template: locales/zh-CN/prompt_report_template.html
    schema: schemas/prompt_assessment.schema.json
    rules:
    - html_output_must_be_self_contained
    - no_external_javascript_or_css
    - no_network_dependency
    - user_prompt_must_be_html_escaped
    - radar_must_be_static_svg
    - do_not_paste_raw_html_into_chat
    chat_before_html_rule_zh: 先在聊天中分开完成分类页、节点覆盖页和雷达页；HTML 仅作为用户选择后的完整附件。
  workbuddy_delivery:
    preferred_behavior_zh: 生成 HTML 文件后，通过当前会话的文件预览、附件或网页预览能力呈现。
    fallback_zh: 若无法预览 HTML，展示分类、节点表、五维分数条和总分；明确说明可视化降级，不省略评测内容。
  accessibility:
  - radar_has_text_equivalent
  - status_never_relies_on_color_only
  - mobile_width_supported
  learning_pages:
    delivery_zh: 使用宿主普通对话文本页面；每个助手回复只渲染一个学习页面，并在输出后立即结束回合。
    node_page_template: locales/zh-CN/node_step.md
    node_explanation_template: locales/zh-CN/node_explanation.md
    assembly_page_template: locales/zh-CN/type_prompt_result.md
    raw_html_not_required: true
    interaction_mode: text_nonblocking
    native_question_panels_enabled: false
    choice_options: numbered_plain_text
