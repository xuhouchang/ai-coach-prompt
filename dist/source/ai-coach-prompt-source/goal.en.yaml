---
goal:
  learner_outcome_zh: 用户通过一个节点一个页面的练习，完成至少一种 Prompt 类型的完整构建，并能在最终测试中识别类型、节点缺口和五维质量。
  observable_outcomes:
  - understand_prompt_definition
  - distinguish_prompt_myths
  - complete_type_node_pages
  - assemble_full_prompt_from_nodes
  - learn_multiple_task_types
  - classify_real_prompt
  - interpret_node_coverage
  - interpret_five_dimension_radar
  primary_user_journey_zh: 4 题问卷 → Prompt 定义页 → 玄学说明页 → 五维框架页 → 六类地图 → 类型 N 节点学习循环 → 最终测试
