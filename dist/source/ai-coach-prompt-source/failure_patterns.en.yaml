---
failure_patterns:
  - id: missing_task_goal
    severity: critical
    radar_dimension: task_goal
    feedback_zh: 任务动作、对象或最终目标没有定义清楚。
    repair_question_zh: 这条 Prompt 最终要让 AI 交付什么，并支持什么结果？
  - id: missing_source_or_evidence
    severity: critical_when_source_dependent
    radar_dimension: input_evidence
    feedback_zh: 缺少材料、数据、字段、维度或评估依据。
    repair_question_zh: AI 应该基于哪些材料或事实完成这项任务？
  - id: missing_type_specific_core_node
    severity: critical
    radar_dimension: input_evidence
    feedback_zh: 该任务类型最关键的专属节点没有定义。
    repair_question_zh: 请补充当前任务最关键的【节点名称】。
  - id: missing_context_boundary
    severity: medium
    radar_dimension: context_boundaries
    feedback_zh: 受众、用途、范围或禁止项不清楚。
    repair_question_zh: 结果给谁使用，哪些内容或范围需要明确排除？
  - id: missing_output_contract
    severity: medium
    radar_dimension: output_contract
    feedback_zh: 输出形式、结构、长度或顺序没有明确。
    repair_question_zh: 最终结果需要用什么结构和格式交付？
  - id: missing_acceptance_rule
    severity: high
    radar_dimension: acceptance_stability
    feedback_zh: 缺少可检查的验收、核验或结论规则。
    repair_question_zh: 什么条件满足时，这个结果可以直接使用？
  - id: conflicting_constraints
    severity: critical
    radar_dimension: acceptance_stability
    feedback_zh: Prompt 中存在无法同时满足的要求。
    repair_question_zh: 这组冲突要求中，哪一条优先级更高？
  - id: ritual_padding
    severity: low
    radar_dimension: none
    feedback_zh: “深呼吸、认真思考”等仪式词没有增加任务信息。
    repair_question_zh: 需要把这段仪式词替换成哪项具体步骤或检查规则？
  - id: empty_expert_role
    severity: low
    radar_dimension: none
    feedback_zh: 空泛专家角色没有定义受众、场景或交付标准。
    repair_question_zh: 这个角色真正需要体现的专业判断或输出要求是什么？
  - id: generic_quality_words
    severity: low
    radar_dimension: acceptance_stability
    feedback_zh: “全面、深入、专业”缺少可检查的含义。
    repair_question_zh: 你希望用哪些具体维度或标准定义“高质量”？
