---
scenario_bank:
  - scenario_id: generation_client_followup
    industry: 通用
    primary_task_type: generation_task
    frequent_task_family: 写内容或沟通材料
    vague_request_zh: 帮我写一封客户跟进邮件。
    classification_reason_zh: 最终需要创建一封原本不存在的邮件，核心工作属于生成型。
    missing_node_ids:
      - deliverable_goal
      - source_context
      - audience_use_case
      - content_scope
      - output_contract
      - acceptance_criteria
    improved_prompt_zh: |
      请基于我提供的会议纪要，写一封会后跟进邮件，目标是推动客户确认下一次需求澄清会。收件人是客户业务负责人。请概括双方确认的三项痛点、当前共识和下一步，不承诺未确认的价格与交期。邮件包含主题行和三段正文，300 字以内，语气专业、直接、不过度推销。结果应能无需二次改写直接发送，并包含一个明确、低压力的行动请求。

  - scenario_id: comparison_competitor_analysis
    industry: 通用
    primary_task_type: comparison_task
    frequent_task_family: 分析、对比或评估
    vague_request_zh: 帮我写一份竞品分析。
    classification_reason_zh: 核心工作是将多个竞品放在统一维度下比较，“写”只描述最终交付动作。
    missing_node_ids:
      - decision_goal
      - comparison_objects
      - evidence_sources
      - comparison_dimensions
      - audience_use_case
      - output_contract
      - acceptance_criteria
    improved_prompt_zh: |
      请基于我提供的 A、B、C 三家竞品官网截图、定价页和产品说明，对比功能覆盖、定价策略和目标客户。结果用于下周产品策略会，读者是产品总监。先输出对照表，每家竞品一行；再给 3 条关键差异、2 条机会判断和 2 个待确认问题。所有事实注明来源，材料未覆盖的内容标记为“待补充”，不要自行编造。结果应能直接放入会议材料。

  - scenario_id: extraction_meeting_notes
    industry: 通用
    primary_task_type: extraction_task
    frequent_task_family: 整理资料或提取信息
    vague_request_zh: 帮我整理一下会议纪要。
    classification_reason_zh: 已经存在会议材料，核心工作是从中提取并结构化信息。
    missing_node_ids:
      - source_material
      - extraction_fields
      - inclusion_exclusion_rules
      - output_contract
      - verification_rules
    improved_prompt_zh: |
      请基于我上传的会议转写稿，提取议题、结论、行动项、负责人、截止时间和待确认事项。只保留会议中明确表达的内容；推断项标记为“待确认”，未提及字段写“未提及”。输出两部分：先给 5 行以内的会议摘要，再给行动项表格，每条一行，并保留对应时间戳。信息冲突时并列原文，不自行裁决。

  - scenario_id: multistep_market_research
    industry: 通用
    primary_task_type: multistep_task
    frequent_task_family: 完成多步骤工作
    vague_request_zh: 帮我调研一下这个市场，然后给我一个建议。
    classification_reason_zh: 需要按顺序完成资料收集、校验、分析、评估和建议，后一步依赖前一步结果。
    missing_node_ids:
      - final_goal
      - inputs_sources
      - step_sequence
      - intermediate_outputs
      - context_boundaries
      - decision_acceptance_rules
      - final_output_contract
    improved_prompt_zh: |
      请评估中国企业 AI 培训市场是否值得启动一个 8 周 POC。使用近 24 个月的行业报告、主要供应商官网、公开招投标信息和我提供的访谈记录。按“来源清单 → 事实表 → 需求与竞争格局 → 机会评分 → 风险 → 建议”执行，每一步保留中间产物。只使用可追溯资料，关键事实至少双源验证。按市场需求、获客难度、交付壁垒和毛利潜力各 25 分评分，总分达到 70 分才建议进入。最终输出一页执行摘要、证据表和 30 天行动计划。

  - scenario_id: mfg_supplier_compare
    industry: 制造/供应链
    primary_task_type: comparison_task
    frequent_task_family: 分析、对比或评估
    vague_request_zh: 帮我对比两家供应商的报价和交期。
    classification_reason_zh: 核心工作是统一口径比较两个供应商，以支持定标。
    missing_node_ids:
      - decision_goal
      - comparison_objects
      - evidence_sources
      - comparison_dimensions
      - audience_use_case
      - output_contract
      - acceptance_criteria
    improved_prompt_zh: |
      请基于 A、B 两家供应商的最新报价单、交期承诺、质检记录和过去 12 个月履约数据，比较总成本、交期、质量稳定性、付款条件和售后响应。结果给采购总监和工厂负责人，用于周五定标会。先给统一口径对照表，再给推荐结论、主要风险和待确认事项。所有数字标明来源与日期；缺失数据不推断。结果需要明确推荐一家供应商，或说明为什么暂时无法定标。

  - scenario_id: edu_microcourse_outline
    industry: 教育/培训
    primary_task_type: generation_task
    frequent_task_family: 写内容或沟通材料
    vague_request_zh: 帮我设计一门 Prompt 微课。
    classification_reason_zh: 目标是创建新的课程结构和教学内容，属于生成型。
    missing_node_ids:
      - deliverable_goal
      - source_context
      - audience_use_case
      - content_scope
      - output_contract
      - acceptance_criteria
    improved_prompt_zh: |
      请设计一门 20 分钟的 Prompt 入门微课，受众是没有技术背景的企业员工。目标是让学员能区分六类常见任务，并用五个通用维度检查一条 Prompt。必须包含一个 bad case、一个 good case、一次分类互动和一次真实 Prompt 评测；不展开模型原理。输出按分钟拆分的教学流程、讲师要点和互动问题。课程结束时，学员应能独立指出一条 Prompt 至少 3 个缺口。

  - scenario_id: ecom_review_reply
    industry: 电商/零售
    primary_task_type: generation_task
    frequent_task_family: 写内容或沟通材料
    vague_request_zh: 帮我回复这条差评。
    classification_reason_zh: 需要根据差评和品牌政策生成一条新的回复，属于生成型。
    missing_node_ids:
      - deliverable_goal
      - source_context
      - audience_use_case
      - content_scope
      - output_contract
      - acceptance_criteria
    improved_prompt_zh: |
      请基于我提供的差评原文、订单情况和售后政策，生成一条公开回复。目标是回应顾客核心不满并引导其转入私信处理。语气诚恳、克制，不争辩，不承诺政策之外的赔偿，不披露订单隐私。回复控制在 120 字以内，包含理解、事实说明、解决路径和私信邀请。结果应能直接发布，并与品牌售后政策一致。

  - scenario_id: fin_product_compare
    industry: 金融/保险
    primary_task_type: comparison_task
    frequent_task_family: 分析、对比或评估
    vague_request_zh: 帮我对比两款年金险产品。
    classification_reason_zh: 需要把两款产品按统一维度比较，并支持客户选择，属于对比型。
    missing_node_ids:
      - decision_goal
      - comparison_objects
      - evidence_sources
      - comparison_dimensions
      - audience_use_case
      - output_contract
      - acceptance_criteria
    improved_prompt_zh: |
      请仅基于我上传的两份产品条款、利益演示表和客户已确认的需求，对比领取安排、现金价值、流动性限制、身故责任和主要费用。结果给客户本人看，用于下一次咨询沟通。先输出事实对照表，再列出各自更适合的需求场景和需要专业人员确认的问题。不得预测收益，不提供个性化投资结论；所有数据注明来源页码，需由持证专业人员复核。

  - scenario_id: media_topic_plan
    industry: 媒体/内容
    primary_task_type: generation_task
    frequent_task_family: 写内容或沟通材料
    vague_request_zh: 帮我列一些短视频选题。
    classification_reason_zh: 目标是创建新的选题清单，属于生成型。
    missing_node_ids:
      - deliverable_goal
      - source_context
      - audience_use_case
      - content_scope
      - output_contract
      - acceptance_criteria
    improved_prompt_zh: |
      请基于栏目定位、最近 30 天评论区高频问题和我提供的 5 条高表现视频，生成下一周 10 个短视频选题。受众是关注企业 AI 落地的管理者。每个选题包含标题、核心冲突、3 个内容点、适合时长和可引用案例；避免纯工具测评和无事实支撑的宏观判断。按“高确定性 / 需要补资料”分组，至少 6 个选题可以在现有素材下立即拍摄。

  - scenario_id: sw_arch_eval
    industry: 互联网/软件
    primary_task_type: evaluation_task
    frequent_task_family: 分析、对比或评估
    vague_request_zh: 帮我看看这个架构能不能扛住增长。
    classification_reason_zh: 核心问题是按标准判断架构是否满足目标规模，属于评估型。
    missing_node_ids:
      - evaluation_object
      - evaluation_criteria
      - evidence_sources
      - context_risk_boundary
      - scoring_decision_rule
      - output_contract
    improved_prompt_zh: |
      请基于我上传的架构图、当前流量指标、数据库容量和目标规模，评估该方案能否支持未来 12 个月 10 倍请求增长。按吞吐、延迟、可用性、数据一致性、扩容复杂度和成本评估。P95 延迟超过 300ms、单点故障或迁移停机超过 2 小时列为红线。每项 0–5 分，总分不低于 24 且无红线才建议推进。输出一句话结论、评分表、瓶颈、验证实验和待确认数据。
