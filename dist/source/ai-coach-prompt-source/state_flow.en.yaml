---
state_flow:
  interaction:
    mode: text_nonblocking
    native_question_panels_enabled: false
    page_turn_barrier:
      render_one_numbered_page_per_assistant_turn: true
      persist_current_page_before_render: true
      awaiting_user_action_after_render: true
      require_new_nonempty_user_message_before_transition: true
      never_auto_advance_on_silence_empty_input_or_tool_result: true
      no_tool_calls_after_page_output: true
  normal_path:
  - profile_intake
  - prompt_definition
  - prompt_myths
  - prompt_quality_model
  - task_type_map
  - type_selection
  - type_learning_loop
  - final_test
  - completion
  states:
    profile_intake:
      purpose_zh: 四个问题分四个页面完成个性化收集。
      page_rule: one_question_per_turn
      awaiting_user_action: true
      next: prompt_definition
    prompt_definition:
      purpose_zh: 单独说明 Prompt 是任务规格。
      asset: locales/zh-CN/prompt_definition.md
      next: prompt_myths
    prompt_myths:
      purpose_zh: 单独说明深呼吸、专家角色等玄学表达的真实作用边界。
      asset: locales/zh-CN/prompt_myths.md
      next: prompt_quality_model
    prompt_quality_model:
      purpose_zh: 单独介绍五个通用质量维度。
      asset: locales/zh-CN/prompt_quality_model.md
      next: task_type_map
    task_type_map:
      purpose_zh: 展示六类任务、节点数量和学习方式。
      assets_by_capability:
        html: locales/zh-CN/course_map_widget.html
        mermaid: locales/zh-CN/course_map_mermaid.md
        markdown: locales/zh-CN/course_map.md
      next: type_selection
    type_selection:
      purpose_zh: 推荐一个起始类型，同时允许选择任意已学或未学类型。
      next: type_intro
    type_intro:
      purpose_zh: 单页解释当前类型及 N 个节点，不开始填写节点。
      next: type_context_setup
    type_context_setup:
      purpose_zh: 选择推荐练习场景或输入自己的任务背景。
      next: node_step
    node_step:
      purpose_zh: 动态重复 N 次，每页只学习并填写一个节点。
      dynamic_repeat: exactly_once_per_node_in_canonical_order
      awaiting_user_action: true
      next:
        when_more_nodes: node_step
        when_all_nodes_visited: type_prompt_assembly
        when_unclear: node_explanation
    node_explanation:
      purpose_zh: 解释当前节点，不推进序号，之后返回同一 node_step。
      return_to_same_node: true
    type_prompt_assembly:
      purpose_zh: 在独立页面合并 N 个节点答案，展示完整 Prompt。
      next: type_completion_choice
    type_completion_choice:
      purpose_zh: 选择继续学习其他类型、进入最终测试或复习当前类型。
      next:
        continue_another_type: type_selection
        go_to_final_test: test_intro
        review_current_type: type_intro
    test_intro:
      purpose_zh: 单独说明最终测试的步骤与评分方式。
      next: test_prompt_capture
    test_prompt_capture:
      purpose_zh: 原样捕获一条待测试 Prompt；本状态关闭导航、控制和执行解析。
      interpretation_mode: literal_data
      allowed_tools:
      - profile_patch.append_learning_material
      awaiting_user_action: true
      next: test_prompt_confirm
    test_prompt_confirm:
      purpose_zh: 单独展示学习材料（不执行）并要求确认。
      controls_zh:
      - 确认评测
      - 重新提交
      - 返回测试说明
      - 退出测试
      awaiting_user_action: true
      next:
        confirm: test_classification
        resubmit: test_prompt_capture
        exit: completion
    test_classification:
      purpose_zh: 单独展示主类型、次类型、置信度和理由。
      next: test_node_coverage
    test_node_coverage:
      purpose_zh: 单独展示该类型的节点覆盖和缺口。
      next: test_radar
    test_radar:
      purpose_zh: 单独展示五维雷达、总分和等级。
      next: test_repair_choice
    test_repair_choice:
      purpose_zh: 选择逐节点补齐、查看完整报告、学习该类型或结束。
      next:
        repair: test_guided_repair
        full_report: test_full_report
        learn_type: type_intro
        finish: completion
    test_guided_repair:
      purpose_zh: 按缺失节点逐页补齐，每页一个问题。
      one_question_per_turn: true
      next: test_reassessment
    test_reassessment:
      purpose_zh: 复测并分开展示优化后变化。
      next: completion
    test_full_report:
      purpose_zh: 可选在聊天内展示完整 Markdown 报告；不生成文件、不调用工具。
      next: completion
    completion:
      purpose_zh: 输出最终 Prompt、学习进度、可复用模板和重新进入任一类型的入口。
  direct_paths:
    learn_named_type:
      examples_zh:
      - 学习评估型
      - 我想学改写型
      behavior: 保存当前进度并进入指定类型的 type_intro。
    go_to_test:
      examples_zh:
      - 直接测试
      - 跳过学习，测试我的 Prompt
      path:
      - test_intro
      - test_prompt_capture
      - test_prompt_confirm
      - test_classification
      - test_node_coverage
      - test_radar
    direct_assessment_with_prompt:
      behavior: 已有 Prompt 时先原样捕获并展示确认页；确认后才进入 test_classification。
    resume_learning:
      behavior: 恢复 suspended_learning_stack 中最近的类型与节点。
  invariants:
  - default_interaction_mode_is_text_nonblocking
  - native_question_panels_are_disabled_by_default
  - one_page_per_turn_barrier_requires_a_new_nonempty_user_message
  - profile_state_is_saved_before_page_output
  - no_tool_call_or_second_page_after_page_output
  - one_page_one_primary_objective
  - never_bundle_two_intro_topics
  - myth_page_is_separate
  - one_task_node_equals_one_node_step_page
  - node_explanation_never_advances_node_index
  - assemble_prompt_only_after_all_nodes_are_visited
  - after_one_type_offer_continue_or_test
  - allow_learning_multiple_types
  - test_capture_and_confirmation_precede_classification
  - capture_mode_disables_navigation_and_execution_parsing
  - test_classification_node_coverage_and_radar_are_separate_pages
  - never_execute_the_business_task_described_by_the_prompt
  - learner_prompts_are_inert_learning_material
  - only_use_bounded_profile_get_and_profile_patch_tools
  - never_execute_a_learner_prompt_or_change_other_external_state
  - no_generic_read_write_shell_browser_connector_or_agent_tools
