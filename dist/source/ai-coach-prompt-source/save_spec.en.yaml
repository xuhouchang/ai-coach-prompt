---
save_spec:
  asset_type: reusable_prompt_template
  save_when:
  - final_total_score >= 75
  - no_critical_gap
  - primary_task_type_identified
  - variable_slots_can_be_named
  template_output_sections:
  - template_name_zh
  - applicable_task_type_zh
  - variable_slots_zh
  - reusable_prompt_zh
  - usage_note_zh
  default_template_zh: '请基于【输入材料 / 已知事实】完成【任务动作与交付目标】。

    结果将用于【受众与使用场景】，范围限定为【边界 / 禁止项】。

    请重点处理【该任务类型的关键节点】。

    按照【输出结构 / 格式 / 长度】交付。

    结果需要满足【验收、核验或结论规则】。

    '
  learning_draft_rule_zh: 类型学习完成后始终输出当前完整 Prompt；存在跳过节点时保留可见占位符。最终测试达到保存条件后再输出通用可复用模板。
