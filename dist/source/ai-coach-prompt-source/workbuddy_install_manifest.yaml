manifest_version: 2
package:
  name: ai-coach-prompt
  version: 3.1.2
  entrypoint: skills/ai-coach-prompt/SKILL.md
  metadata: skills/ai-coach-prompt/skill.yml
  language: zh-CN
  requires_network: false
  install_mode: workbuddy_plugin
  capability_policy:
    default_deny: true
    allowed_tools:
    - mcp__ai-coach-profile__course_resource_get
    - mcp__ai-coach-profile__profile_get
    - mcp__ai-coach-profile__profile_patch
    forbidden_tool_classes:
    - generic_filesystem
    - shell
    - browser
    - messaging
    - calendar
    - tasks
    - connectors
    - agent_delegation
    interaction:
      mode: text_nonblocking
      native_question_panels_enabled: false
  profile_store:
    server: ai-coach-profile
    schema: schemas/learner_profile.schema.json
    identity_source: plugin_local_user
    path_arguments_exposed_to_model: false
  renderers:
    course_map:
      html: locales/zh-CN/course_map_widget.html
      markdown: locales/zh-CN/course_map.md
  source_of_truth:
    task_types: task_types.en.yaml
    assessment: assessment.en.yaml
    learning: type_learning.en.yaml
  validation_command: python3 scripts/validate_skill.py
