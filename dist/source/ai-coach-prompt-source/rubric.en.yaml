---
review_rubric:
  canonical_assessment_file: assessment.en.yaml
  total_weight: 100
  dimensions:
  - id: task_goal
    label_zh: 任务与目标
    weight: 20
    full_score_evidence_zh:
    - 主任务动作明确
    - 处理对象或交付物明确
    - 结果要支持的目标明确
  - id: input_evidence
    label_zh: 输入与依据
    weight: 20
    full_score_evidence_zh:
    - 输入材料或数据来源明确
    - 任务特有的字段、维度或标准明确
    - 不要求模型凭空补事实
  - id: context_boundaries
    label_zh: 场景与边界
    weight: 20
    full_score_evidence_zh:
    - 受众与使用场景明确
    - 范围、限制或禁止项明确
    - 高风险任务包含必要复核边界
  - id: output_contract
    label_zh: 输出契约
    weight: 20
    full_score_evidence_zh:
    - 交付形式明确
    - 结构、顺序或长度明确
    - 多步骤任务定义中间产物
  - id: acceptance_stability
    label_zh: 验收与稳定性
    weight: 20
    full_score_evidence_zh:
    - 可用标准可检查
    - 缺失、冲突或不确定信息有处理规则
    - 结论或通过条件明确
  report_requirements:
    show_total_score: true
    show_score_band: true
    show_five_dimension_scores: true
    show_radar: true
    show_type_specific_node_coverage: true
    show_classification_confidence: true
    hide_internal_weights: true
    hide_chain_of_thought: true
    chat_pages_separate: true
    full_html_is_optional: true
  evidence_rules:
  - 每个“已覆盖”必须引用或近似复述原 Prompt 中的证据。
  - 每个“部分覆盖”必须说明已经有哪一部分、还缺哪一部分。
  - 不得因为模板中存在某节点就默认用户缺失，必须检查原文。
  - 生成型任务不强制要求外部材料，但必须有足够的背景或允许合理占位。
