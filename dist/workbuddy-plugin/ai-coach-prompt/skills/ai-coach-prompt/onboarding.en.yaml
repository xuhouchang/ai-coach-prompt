---
onboarding:
  first_message_zh: 你好。我会先用 4 个很短的问题匹配你的学习路线，现在不需要写长 Prompt。第 1 题：你现在使用 AI 的熟练度更接近哪种？
  pacing:
    one_question_per_turn: true
    do_not_load_course_before_q1: true
    after_profile_complete:
    - show_personalized_route_summary
    - enter_prompt_definition_page
  route_summary_template_zh: 你目前更接近【学习级别】；系统会优先推荐【推荐类型 1】和【推荐类型 2】，但你可以学习任意类型。
  memory_policy:
    profile_is_personalization_only: true
    resumable_state_must_not_be_inferred_from_profile: true
    allowed_profile_fields:
    - ai_fluency
    - frequent_task_family
    - industry
    - learning_goals
    - learner_level
    - updated_at
