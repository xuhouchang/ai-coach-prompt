---
prompt_assessment:
  canonical_task_types_file: task_types.en.yaml
  evaluation_order:
  - classify_primary_and_secondary_type
  - evaluate_type_specific_nodes
  - calculate_five_dimension_scores
  - identify_repair_priorities
  node_status:
    complete:
      value: 1.0
      label_zh: 已覆盖
      icon: ✅
    partial:
      value: 0.5
      label_zh: 部分覆盖
      icon: ⚠️
    missing:
      value: 0.0
      label_zh: 缺失
      icon: ❌
  radar_dimensions:
    task_goal:
      label_zh: 任务与目标
      description_zh: 动作、对象、交付目标和主任务结构是否清楚。
      weight: 20
    input_evidence:
      label_zh: 输入与依据
      description_zh: 材料、事实、字段、维度或评估依据是否明确。
      weight: 20
    context_boundaries:
      label_zh: 场景与边界
      description_zh: 受众、用途、范围、禁止项和风险边界是否明确。
      weight: 20
    output_contract:
      label_zh: 输出契约
      description_zh: 结构、格式、长度、顺序和中间产物是否明确。
      weight: 20
    acceptance_stability:
      label_zh: 验收与稳定性
      description_zh: 可用标准、核验规则、冲突处理和结论规则是否明确。
      weight: 20
  scoring_method:
    node_contribution: complete=1.0, partial=0.5, missing=0.0
    dimension_formula: round(100 * average(node values mapped to dimension))
    total_formula: round(weighted_average(five dimension scores))
    no_node_for_dimension_rule: use_global_prompt_evidence_check
    consistency_caps:
    - condition: task_object_or_deliverable_missing
      dimension: task_goal
      max_score: 40
    - condition: source_dependent_task_without_source
      dimension: input_evidence
      max_score: 25
    - condition: mutually_conflicting_constraints
      dimension: acceptance_stability
      max_score: 40
  score_bands:
  - min: 90
    max: 100
    label_zh: 可直接执行
    interpretation_zh: 关键节点基本完整，AI 只需要极少猜测。
  - min: 75
    max: 89
    label_zh: 基本可执行
    interpretation_zh: 已具备可执行结构，仍有少量缺口会影响稳定性。
  - min: 60
    max: 74
    label_zh: 需要补强
    interpretation_zh: 任务方向清楚，关键节点仍有明显空缺。
  - min: 0
    max: 59
    label_zh: 定义不足
    interpretation_zh: AI 需要自行猜测多个核心变量。
  classification_confidence:
    high: 0.85
    medium: 0.65
    low: 0.0
  repair_priority:
    order:
    - missing_task_goal
    - missing_source_or_evidence
    - missing_type_specific_core_node
    - conflicting_constraints
    - missing_acceptance_rule
    - missing_output_contract
    - missing_context_boundary
    max_items_in_report: 3
    max_questions_per_session:
      beginner: 3
      standard: 3
      advanced: 2
  learner_report_order:
  - test_classification_page
  - test_node_coverage_page
  - test_radar_page
  - test_repair_choice_page
  chat_presentation_rule_zh: 分类、节点覆盖和雷达评分必须分三个页面展示。完整 HTML 仅作为用户选择后的附加报告。
