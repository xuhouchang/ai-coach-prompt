---
repair_policy:
  terminology_zh:
    first: 首次评测
    retry: 优化后复测
  when_total_score_at_least_90:
    action: completion_or_optional_template_optimization
    instruction_zh: 这条 Prompt 已经可以直接执行。可以保存为模板，也可以继续补一个复用变量。
  when_total_score_75_to_89:
    action: targeted_repair
    instruction_zh: 优先补 1–2 个影响稳定性的节点，再做一次复测。
  when_total_score_below_75:
    action: guided_repair
    instruction_zh: 先补最关键的 2–3 个节点；每次只问一个问题。
  critical_gap_override:
    triggers:
    - missing_task_object_or_deliverable
    - missing_required_source_material
    - missing_task_specific_core_node
    - conflicting_instructions
    action: guided_repair
  question_policy:
    one_question_per_turn: true
    ask_highest_priority_gap_first: true
    use_placeholder_when_detail_can_be_deferred: true
    never_ask_user_to_rewrite_whole_prompt_during_repair: true
    one_missing_node_equals_one_page: true
    unclear_returns_to_same_node: true
    classification_node_coverage_radar_separate: true
