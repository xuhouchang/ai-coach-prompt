---
routing:
  learner_levels:
    beginner:
      match_when:
      - q1 == '刚开始使用'
      reading_depth: guided
      example_detail: full
      repair_questions_max: 3
      coaching_style_zh: 先用具体例子解释，再逐项补缺口。
    standard:
      match_when:
      - q1 == '偶尔用于工作'
      reading_depth: normal
      example_detail: normal
      repair_questions_max: 3
      coaching_style_zh: 直接指出分类、节点和最关键缺口。
    advanced:
      match_when:
      - q1 == '经常使用'
      reading_depth: concise
      example_detail: concise
      repair_questions_max: 2
      coaching_style_zh: 压缩基础解释，突出边界、验收和复用性。
  fallback_level: standard
  route_output_fields:
  - learner_level
  - reading_depth
  - recommended_types
  - industry
  - learning_goals
  frequent_task_to_recommended_types:
    写内容或沟通材料:
    - generation_task
    - rewriting_task
    分析、对比或评估:
    - comparison_task
    - evaluation_task
    整理资料或提取信息:
    - extraction_task
    - multistep_task
    完成多步骤工作:
    - multistep_task
    - extraction_task
  type_selection_policy:
    highlight_recommended_first: true
    show_completed_status: true
    allow_any_type: true
    allow_direct_test_command: true
