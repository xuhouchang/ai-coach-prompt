---
glossary:
  prompt_spec:
    term_zh: 任务规格书
    definition_zh: 对任务动作、输入、场景、输出和验收方式的明确约定。
  task_type:
    term_zh: 任务类型
    definition_zh: AI 实际要完成的主导工作结构，包括抽取、对比、评估、生成、改写和多步骤。
  node:
    term_zh: 任务节点
    definition_zh: 某类任务稳定执行所需的一项关键信息。
  node_coverage:
    term_zh: 节点覆盖
    definition_zh: Prompt 对某个任务节点的定义程度，分为已覆盖、部分覆盖和缺失。
  radar_score:
    term_zh: 五维雷达
    definition_zh: 从任务与目标、输入与依据、场景与边界、输出契约、验收与稳定性五个维度展示 Prompt 完整度。
  output_contract:
    term_zh: 输出契约
    definition_zh: 对交付格式、结构、长度、顺序或中间产物的明确要求。
