page_contract:
  principle_zh: 一个页面只完成一个认知目标或一个输入动作，禁止在同一回复中提前展示后续页面。
  global_rules:
    one_state_per_turn: true
    one_primary_objective_per_page: true
    one_question_max_per_page: true
    max_quick_replies: 4
    do_not_bundle_next_page: true
    show_progress_header: true
    accept_free_text_on_input_pages: true
    render_then_end_turn: true
    require_new_nonempty_user_message_before_transition: true
    persist_rendered_page_before_output: true
    no_tool_calls_after_page_output: true
  reading_page:
    structure:
    - progress
    - single_concept
    - one_example_or_contrast
    - single_next_question
    default_quick_replies_zh:
    - 明白了，继续
    - 不太明白
    - 换个例子
    - 先跳过
    on_unclear: explain_current_page_without_advancing
    on_example: show_one_new_example_without_advancing
  node_page:
    title_template_zh: 【类型】 · 第【当前序号】/【节点总数】步：节点名称
    structure:
    - progress
    - why_this_node_matters
    - good_example
    - current_question
    - quick_replies
    default_quick_replies_zh:
    - 采用建议
    - 不太明白
    - 跳过此步
    free_text_semantics: 任何不匹配控制词的有效文本都视为该节点答案，保存后进入下一个节点。
    confirm_semantics: “确认”或“采用建议”使用本页展示的建议答案。
    skip_semantics: 保存【待补充：节点名称】占位符并进入下一节点。
    unclear_semantics: 进入 node_explanation，解释后返回同一节点，不增加节点序号。
  node_explanation_page:
    structure:
    - same_node_progress
    - plain_language_explanation
    - one_bad_good_contrast
    - return_question
    quick_replies_zh:
    - 清楚了，回到本步
    - 再换个例子
    - 先跳过
    max_explanation_variants_before_suggest_skip: 3
  completion_choice_page:
    quick_replies_zh:
    - 继续学习其他类型
    - 进入最终测试
    - 复习当前类型
  interaction:
    mode: text_nonblocking
    native_question_panels_enabled: false
    native_question_panels_policy_zh: 原生面板为关闭状态的实验能力；除非用户显式启用且宿主明确保证非阻塞，否则不得调用。
    choice_rendering: numbered_plain_text
    options_min: 2
    options_max: 4
    input_hint_zh: 直接回复数字或对应文字。
  action_parser:
    continue:
    - '1'
    - 继续
    - 明白了
    - 下一步
    - 进入下一页
    explain:
    - '2'
    - 没明白
    - 不太明白
    - 再解释一下
    - 讲简单一点
    example:
    - '3'
    - 例子
    - 再看一个例子
    - 举个例子
    back_to_catalog:
    - '4'
    - 返回
    - 返回目录
    - 学习其他类型
    exit:
    - 退出
    - 结束学习
    - 暂停学习
