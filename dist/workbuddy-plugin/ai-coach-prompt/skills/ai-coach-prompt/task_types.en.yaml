---
task_type_catalog:
  classification_principle_zh: 按 AI 实际要完成的主导工作结构分类，不按“写、整理、看看”等表面动词分类。
  mixed_task_rule_zh: 一个需求可以有主类型和次类型。主类型决定节点清单，次类型只补充必要约束。
  types:
    extraction_task:
      label_zh: 抽取型
      definition_zh: 从已有材料中识别并提取指定信息。
      clues_zh:
      - 输入材料已经存在
      - 目标是找字段、事实、行动项或结构化信息
      common_examples_zh:
      - 从会议记录中提取行动项
      - 从合同中提取付款与终止条款
      nodes:
      - id: source_material
        label_zh: 源材料
        radar_dimension: input_evidence
        ask_zh: 信息从什么材料中提取？
        good_example_zh: 基于我上传的会议转写稿，保留原始时间戳。
        purpose_zh: AI 需要知道从哪里找事实，否则会混入常识或自行补充。
        unclear_explanation_zh: 它相当于给 AI 指定“资料柜”。没有资料柜，AI 只能猜应该看什么。
        fragment_template_zh: 基于【材料名称、版本或范围】
      - id: extraction_fields
        label_zh: 提取字段
        radar_dimension: task_goal
        ask_zh: 要提取哪些具体字段？
        good_example_zh: 提取议题、结论、负责人、截止时间和待确认事项。
        purpose_zh: 字段决定 AI 要找什么，也是后续检查是否漏项的清单。
        unclear_explanation_zh: “整理重点”很模糊；“提取负责人、截止时间、行动项”才可以逐项核对。
        fragment_template_zh: 提取【字段 1、字段 2、字段 3】
      - id: inclusion_exclusion_rules
        label_zh: 取舍边界
        radar_dimension: context_boundaries
        ask_zh: 哪些内容要保留，哪些内容要排除？
        good_example_zh: 只提取会议中明确表达的内容，推断项标记为“待确认”。
        purpose_zh: 取舍边界决定哪些信息进入结果，哪些内容必须排除或标记。
        unclear_explanation_zh: 同一句话里，明确结论和推测意见需要分开处理，否则输出会把猜测当事实。
        fragment_template_zh: 只保留【范围】，排除【范围】，推断项按【规则】处理
      - id: output_contract
        label_zh: 输出结构
        radar_dimension: output_contract
        ask_zh: 结果用什么结构呈现？
        good_example_zh: 输出 Markdown 表格，每条行动项一行。
        purpose_zh: 输出结构决定结果能否直接进入下一步工作。
        unclear_explanation_zh: 同一批信息可以写成长文，也可以变成表格；使用场景决定哪一种更合适。
        fragment_template_zh: 按【格式、字段顺序、长度】输出
      - id: verification_rules
        label_zh: 核验规则
        radar_dimension: acceptance_stability
        ask_zh: 怎样处理缺失、冲突或不确定信息？
        good_example_zh: 未提及写“未提及”，信息冲突时并列原文并标出来源。
        purpose_zh: 核验规则让缺失、冲突和不确定信息有固定处理方式。
        unclear_explanation_zh: 没有核验规则时，模型往往会把空白补成看似合理的答案。
        fragment_template_zh: 缺失时【处理】，冲突时【处理】，不确定时【处理】
      learning_intro_zh: 把“整理一下”拆成可核验的字段提取任务。
      assembly_template_zh: '请基于{{source_material}}，提取{{extraction_fields}}。

        取舍边界：{{inclusion_exclusion_rules}}。

        请按{{output_contract}}输出。

        核验与异常处理：{{verification_rules}}。'
      learning_page_count: 5
    comparison_task:
      label_zh: 对比型
      definition_zh: 将多个对象放在统一维度下比较，以支持选择或判断。
      clues_zh:
      - 至少有两个对象
      - 需要统一维度、差异结论或选型建议
      common_examples_zh:
      - 对比两家供应商
      - 分析三款竞品的定价策略
      nodes:
      - id: decision_goal
        label_zh: 决策目标
        radar_dimension: task_goal
        ask_zh: 这次对比最终支持什么决定？
        good_example_zh: 帮助采购团队在两家供应商中选择一家进入合同谈判。
        purpose_zh: 对比需要服务于一个决定，否则容易堆砌差异却不给结论。
        unclear_explanation_zh: “比较产品”只描述动作；“支持是否采购”才说明比较要解决的问题。
        fragment_template_zh: 本次对比用于决定【决策事项】
      - id: comparison_objects
        label_zh: 对比对象
        radar_dimension: task_goal
        ask_zh: 要比较哪些具体对象？
        good_example_zh: A 供应商 7 月 12 日报价与 B 供应商 7 月 14 日报价。
        purpose_zh: 对象必须具体且口径一致，才能避免比较错版本或错范围。
        unclear_explanation_zh: 产品 A 和产品 B 仍可能有多个套餐、地区或日期版本，需要进一步限定。
        fragment_template_zh: 比较【对象 A】与【对象 B】，版本/时间范围为【范围】
      - id: evidence_sources
        label_zh: 依据材料
        radar_dimension: input_evidence
        ask_zh: 对比依据来自哪些材料？
        good_example_zh: 两份报价单、交期承诺、质检记录和历史履约数据。
        purpose_zh: 依据材料决定哪些结论可以被追溯。
        unclear_explanation_zh: 官网、报价单和用户评价的可信度与用途不同，需要明确来源。
        fragment_template_zh: 依据【材料 1、材料 2、数据范围】
      - id: comparison_dimensions
        label_zh: 对比维度
        radar_dimension: input_evidence
        ask_zh: 统一比较哪些维度？
        good_example_zh: 总成本、交期、质量稳定性、付款条件和售后响应。
        purpose_zh: 统一维度让多个对象可以在同一坐标系下比较。
        unclear_explanation_zh: A 讲功能、B 讲价格会形成错位信息，无法支持选择。
        fragment_template_zh: 统一比较【维度 1、维度 2、维度 3】
      - id: audience_use_case
        label_zh: 使用场景
        radar_dimension: context_boundaries
        ask_zh: 结果给谁看，用于什么场合？
        good_example_zh: 给采购总监和工厂负责人看，用于周五定标会。
        purpose_zh: 使用场景会影响解释深度、重点和表达形式。
        unclear_explanation_zh: 给技术团队和给管理层看的对比，关注点与术语密度不同。
        fragment_template_zh: 结果给【受众】用于【场景/会议/决定】
      - id: output_contract
        label_zh: 输出结构
        radar_dimension: output_contract
        ask_zh: 对比结果用什么形式呈现？
        good_example_zh: 先给一张对照表，再给结论、风险和待确认事项。
        purpose_zh: 输出结构决定结果能否直接进入下一步工作。
        unclear_explanation_zh: 同一批信息可以写成长文，也可以变成表格；使用场景决定哪一种更合适。
        fragment_template_zh: 按【格式、字段顺序、长度】输出
      - id: acceptance_criteria
        label_zh: 可用标准
        radar_dimension: acceptance_stability
        ask_zh: 怎样算这份对比足以支持决策？
        good_example_zh: 每个结论都能回溯到材料，且明确推荐、保留意见和下一步。
        purpose_zh: 可用标准定义什么时候可以做出推荐，什么时候需要保留意见。
        unclear_explanation_zh: 资料不足时硬给推荐会制造虚假确定性，应提前约定无法判断的条件。
        fragment_template_zh: 结论需满足【条件】，资料不足时【处理】
      learning_intro_zh: 把“分析一下”拆成能支持决策的统一比较任务。
      assembly_template_zh: '请围绕{{decision_goal}}，对{{comparison_objects}}进行比较。

        依据材料：{{evidence_sources}}。

        统一比较维度：{{comparison_dimensions}}。

        结果面向{{audience_use_case}}。

        请按{{output_contract}}输出。

        可用标准：{{acceptance_criteria}}。'
      learning_page_count: 7
    evaluation_task:
      label_zh: 评估型
      definition_zh: 按明确标准对一个对象打分、判断或给出是否通过的结论。
      clues_zh:
      - 核心问题是“是否可行、是否合格、值不值得”
      - 需要评估标准、证据和结论规则
      common_examples_zh:
      - 评估项目方案是否可行
      - 给销售提案打分
      nodes:
      - id: evaluation_object
        label_zh: 评估对象
        radar_dimension: task_goal
        ask_zh: 要评估的具体对象是什么？
        good_example_zh: 评估我上传的《客户成功系统实施方案 V3》。
        purpose_zh: 先锁定评估对象、版本和范围，评分才有明确边界。
        unclear_explanation_zh: “评估方案”可能指商业方案、技术方案或某个版本，结论会完全不同。
        fragment_template_zh: 评估【对象名称、版本、范围】
      - id: evaluation_criteria
        label_zh: 评估标准
        radar_dimension: input_evidence
        ask_zh: 按哪些标准评估？
        good_example_zh: 按需求覆盖、周期、成本、技术风险和运维负担五项评估。
        purpose_zh: 评估标准把主观感受转换成可检查的判断维度。
        unclear_explanation_zh: “专业、可行”缺少口径；成本、周期、风险和覆盖率可以逐项检查。
        fragment_template_zh: 按【标准 1、标准 2、标准 3】评估
      - id: evidence_sources
        label_zh: 证据来源
        radar_dimension: input_evidence
        ask_zh: 判断依据来自哪些材料或数据？
        good_example_zh: 方案正文、客户需求、报价清单和项目排期。
        purpose_zh: 依据材料决定哪些结论可以被追溯。
        unclear_explanation_zh: 官网、报价单和用户评价的可信度与用途不同，需要明确来源。
        fragment_template_zh: 依据【材料 1、材料 2、数据范围】
      - id: context_risk_boundary
        label_zh: 场景与红线
        radar_dimension: context_boundaries
        ask_zh: 评估用于什么场景，哪些情况不可接受？
        good_example_zh: 用于内部立项；周期超过 12 周或依赖未确认接口时列为高风险。
        purpose_zh: 场景与红线说明评估结果用于哪里，以及哪些情况直接不可接受。
        unclear_explanation_zh: 同一个方案用于内部试验和正式生产，对风险的容忍度不同。
        fragment_template_zh: 结果用于【场景】；出现【红线条件】时判为高风险/不通过
      - id: scoring_decision_rule
        label_zh: 结论规则
        radar_dimension: acceptance_stability
        ask_zh: 如何打分，什么条件触发通过或否决？
        good_example_zh: 每项 0–5 分，总分不低于 20 且无红线项时建议推进。
        purpose_zh: 结论规则把各项证据转成分数、等级或是否通过。
        unclear_explanation_zh: 只有维度没有门槛，最终仍会停留在“总体还可以”的模糊结论。
        fragment_template_zh: 每项按【量表】评分；满足【门槛】时【结论】
      - id: output_contract
        label_zh: 输出结构
        radar_dimension: output_contract
        ask_zh: 最终评估报告如何呈现？
        good_example_zh: 一句话结论、评分表、三项主要风险和待澄清问题。
        purpose_zh: 输出结构决定结果能否直接进入下一步工作。
        unclear_explanation_zh: 同一批信息可以写成长文，也可以变成表格；使用场景决定哪一种更合适。
        fragment_template_zh: 按【格式、字段顺序、长度】输出
      learning_intro_zh: 把主观判断拆成有标准、有证据、有结论规则的评估任务。
      assembly_template_zh: '请评估{{evaluation_object}}。

        评估标准：{{evaluation_criteria}}。

        证据来源：{{evidence_sources}}。

        使用场景与红线：{{context_risk_boundary}}。

        评分与结论规则：{{scoring_decision_rule}}。

        请按{{output_contract}}输出。'
      learning_page_count: 6
    generation_task:
      label_zh: 生成型
      definition_zh: 根据目标和素材创建新的内容、文档或方案。
      clues_zh:
      - 目标产物原本不存在
      - 需要定义受众、内容范围、风格和交付形式
      common_examples_zh:
      - 写客户跟进邮件
      - 生成培训大纲
      nodes:
      - id: deliverable_goal
        label_zh: 交付目标
        radar_dimension: task_goal
        ask_zh: 最终需要产出什么，期望推动什么结果？
        good_example_zh: 写一封会后跟进邮件，推动客户确认下一次需求澄清会。
        purpose_zh: 交付目标同时定义产物和希望推动的结果。
        unclear_explanation_zh: “写一封邮件”是产物，“推动客户确认会议”才是业务目标。
        fragment_template_zh: 生成【交付物】，目标是【希望推动的结果】
      - id: source_context
        label_zh: 已知素材
        radar_dimension: input_evidence
        ask_zh: 可以使用哪些背景、事实或素材？
        good_example_zh: 基于会议纪要、客户提出的三项痛点和双方确认的下一步。
        purpose_zh: 已知素材限制内容来源，也减少模型虚构背景。
        unclear_explanation_zh: 有会议纪要时应优先使用纪要，未提供的价格和时间不能自行补充。
        fragment_template_zh: 基于【事实、材料、背景】
      - id: audience_use_case
        label_zh: 受众场景
        radar_dimension: context_boundaries
        ask_zh: 内容给谁看，在什么场景下使用？
        good_example_zh: 收件人是客户业务负责人，邮件将在会后 24 小时内发送。
        purpose_zh: 使用场景会影响解释深度、重点和表达形式。
        unclear_explanation_zh: 给技术团队和给管理层看的对比，关注点与术语密度不同。
        fragment_template_zh: 结果给【受众】用于【场景/会议/决定】
      - id: content_scope
        label_zh: 内容边界
        radar_dimension: context_boundaries
        ask_zh: 必须覆盖什么，哪些内容不要出现？
        good_example_zh: 覆盖会议结论和下一步，不承诺未确认的价格与交期。
        purpose_zh: 内容边界定义必须包含、可以省略和禁止承诺的内容。
        unclear_explanation_zh: 没有边界时，模型容易补充用户未确认的卖点、数字或承诺。
        fragment_template_zh: 必须覆盖【内容】，不要出现【内容/承诺】
      - id: output_contract
        label_zh: 格式语气
        radar_dimension: output_contract
        ask_zh: 需要什么结构、长度和语气？
        good_example_zh: 主题行加三段正文，300 字以内，专业、直接、不过度推销。
        purpose_zh: 输出结构决定结果能否直接进入下一步工作。
        unclear_explanation_zh: 同一批信息可以写成长文，也可以变成表格；使用场景决定哪一种更合适。
        fragment_template_zh: 按【格式、字段顺序、长度】输出
      - id: acceptance_criteria
        label_zh: 可用标准
        radar_dimension: acceptance_stability
        ask_zh: 什么样的结果可以直接使用？
        good_example_zh: 无需二次改写即可发送，且包含一个明确、低压力的行动请求。
        purpose_zh: 可用标准定义什么时候可以做出推荐，什么时候需要保留意见。
        unclear_explanation_zh: 资料不足时硬给推荐会制造虚假确定性，应提前约定无法判断的条件。
        fragment_template_zh: 结论需满足【条件】，资料不足时【处理】
      learning_intro_zh: 把“帮我写”拆成目标、素材、受众、边界和交付标准。
      assembly_template_zh: '请生成{{deliverable_goal}}。

        可使用的背景与素材：{{source_context}}。

        受众与使用场景：{{audience_use_case}}。

        内容边界：{{content_scope}}。

        格式与语气：{{output_contract}}。

        可用标准：{{acceptance_criteria}}。'
      learning_page_count: 6
    rewriting_task:
      label_zh: 改写型
      definition_zh: 保留原文核心事实或意思，同时调整表达、结构、语气或长度。
      clues_zh:
      - 已有原文
      - 重点在保留与改变的边界
      common_examples_zh:
      - 把技术介绍改成客户能看懂的版本
      - 压缩一段冗长说明
      nodes:
      - id: source_content
        label_zh: 原始内容
        radar_dimension: input_evidence
        ask_zh: 要改写的原文或材料是什么？
        good_example_zh: 基于我粘贴的 600 字产品介绍改写。
        purpose_zh: 改写必须有明确原文或材料范围，才能判断哪些信息来自原稿。
        unclear_explanation_zh: 只说“改一下”却没有原文，模型实际上只能重新生成。
        fragment_template_zh: 基于【原文/文件/段落范围】
      - id: transformation_goal
        label_zh: 改写目标
        radar_dimension: task_goal
        ask_zh: 改写后要达到什么效果？
        good_example_zh: 让非技术采购在 30 秒内理解产品价值。
        purpose_zh: 改写目标说明表达需要发生什么变化。
        unclear_explanation_zh: “更好一点”无法执行；“让非技术读者 30 秒读懂”可指导取舍。
        fragment_template_zh: 改写后达到【清晰度、说服力、简洁度等目标】
      - id: target_audience
        label_zh: 目标读者
        radar_dimension: context_boundaries
        ask_zh: 改写后给谁看？
        good_example_zh: 面向制造业客户的采购主管和业务负责人。
        purpose_zh: 目标读者决定术语、背景解释和信息密度。
        unclear_explanation_zh: 同一段技术介绍给工程师和采购主管，需要完全不同的表达。
        fragment_template_zh: 面向【目标读者及其知识背景】
      - id: preserve_rules
        label_zh: 必须保留
        radar_dimension: acceptance_stability
        ask_zh: 哪些事实、观点或措辞不能丢？
        good_example_zh: 保留三项核心能力、价格区间和合规声明。
        purpose_zh: 保留规则保护事实、观点、数字和合规表述不被改写丢失。
        unclear_explanation_zh: 缩短文本时，价格、日期和免责声明可能被误删，需要明确保护。
        fragment_template_zh: 必须保留【事实、数字、观点、措辞】
      - id: change_rules
        label_zh: 允许调整
        radar_dimension: context_boundaries
        ask_zh: 哪些内容可以删、改、重排？
        good_example_zh: 删除内部术语，长句拆短，重复信息合并。
        purpose_zh: 允许调整的范围决定模型可以删减、重排和改写到什么程度。
        unclear_explanation_zh: 没有授权范围时，模型可能过度保守，也可能改动核心含义。
        fragment_template_zh: 允许【删减/重排/改写】，禁止【改变项】
      - id: output_contract
        label_zh: 输出结构
        radar_dimension: output_contract
        ask_zh: 改写结果需要什么格式和长度？
        good_example_zh: 先给 80 字简介，再给三个要点，不超过 220 字。
        purpose_zh: 输出结构决定结果能否直接进入下一步工作。
        unclear_explanation_zh: 同一批信息可以写成长文，也可以变成表格；使用场景决定哪一种更合适。
        fragment_template_zh: 按【格式、字段顺序、长度】输出
      learning_intro_zh: 把“润色一下”拆成保留什么、改变什么以及给谁看的改写任务。
      assembly_template_zh: '请基于{{source_content}}进行改写。

        改写目标：{{transformation_goal}}。

        目标读者：{{target_audience}}。

        必须保留：{{preserve_rules}}。

        允许调整：{{change_rules}}。

        请按{{output_contract}}输出。'
      learning_page_count: 6
    multistep_task:
      label_zh: 多步骤型
      definition_zh: 需要按顺序完成多个相互依赖的子任务，并保留中间产物。
      clues_zh:
      - 单次输出无法完成目标
      - 后一步依赖前一步结果
      common_examples_zh:
      - 先整理访谈，再提炼洞察，最后写报告
      - 收集数据、分析、评估并提出行动建议
      nodes:
      - id: final_goal
        label_zh: 最终目标
        radar_dimension: task_goal
        ask_zh: 整个流程最终要交付什么、支持什么决定？
        good_example_zh: 形成一份新市场进入建议，供管理层决定是否启动 POC。
        purpose_zh: 最终目标为整条工作链设定终点和决策用途。
        unclear_explanation_zh: 没有终点时，多步骤任务会不断扩展，产出很多资料却无法落地。
        fragment_template_zh: 最终形成【交付物】，用于【决定/行动】
      - id: inputs_sources
        label_zh: 输入来源
        radar_dimension: input_evidence
        ask_zh: 每一步需要哪些数据、文件或外部信息？
        good_example_zh: 使用行业报告、竞品官网、访谈记录和内部成本数据。
        purpose_zh: 输入来源定义每一步可使用的数据与事实边界。
        unclear_explanation_zh: 研究任务若不限定来源，容易混入过期或无法追溯的信息。
        fragment_template_zh: 使用【来源、时间范围、文件】
      - id: step_sequence
        label_zh: 步骤顺序
        radar_dimension: task_goal
        ask_zh: 子任务按什么顺序执行？
        good_example_zh: 收集资料 → 校验来源 → 归纳趋势 → 评估机会 → 形成建议。
        purpose_zh: 步骤顺序明确依赖关系，避免在证据不足时提前得出结论。
        unclear_explanation_zh: 应先收集和校验事实，再做分析与建议，顺序颠倒会放大偏差。
        fragment_template_zh: 按【步骤 1 → 步骤 2 → 步骤 3】执行
      - id: intermediate_outputs
        label_zh: 中间产物
        radar_dimension: output_contract
        ask_zh: 每一步需要留下什么结果？
        good_example_zh: 来源清单、事实表、洞察清单、评分表和报告草稿。
        purpose_zh: 中间产物让过程可检查、可恢复，也便于人工介入。
        unclear_explanation_zh: 只有最终报告时，很难发现问题来自资料、分析还是结论阶段。
        fragment_template_zh: 每一步保留【清单/表格/草稿/评分】
      - id: context_boundaries
        label_zh: 边界条件
        radar_dimension: context_boundaries
        ask_zh: 范围、时间、资源和禁止项是什么？
        good_example_zh: 只研究中国市场近 24 个月公开资料，不使用无出处数据。
        purpose_zh: 边界条件控制研究范围、时间、资源和禁止项。
        unclear_explanation_zh: “调研市场”可以无限扩展，需要限定国家、周期、对象和来源。
        fragment_template_zh: 范围限定为【范围】，时间为【期限】，不要【禁止项】
      - id: decision_acceptance_rules
        label_zh: 判断标准
        radar_dimension: acceptance_stability
        ask_zh: 每一步如何通过，最终如何形成结论？
        good_example_zh: 关键事实至少双源验证；机会评分达到 70 分才建议进入。
        purpose_zh: 判断标准规定每一步何时通过，以及最终怎样形成建议。
        unclear_explanation_zh: 没有通过条件，模型可能基于单一来源或少量证据继续推进。
        fragment_template_zh: 每一步满足【条件】后继续；最终按【门槛】形成结论
      - id: final_output_contract
        label_zh: 最终交付
        radar_dimension: output_contract
        ask_zh: 最终结果用什么结构呈现？
        good_example_zh: 一页执行摘要、证据表、机会评分、风险和 30 天行动计划。
        purpose_zh: 最终交付结构把多项中间结果组织成可使用的成果。
        unclear_explanation_zh: 资料清单、评分和建议需要有固定顺序，才能支持复核和决策。
        fragment_template_zh: 最终输出【结构、格式、篇幅、顺序】
      learning_intro_zh: 把复杂目标拆成有顺序、有中间产物和通过标准的工作链路。
      assembly_template_zh: '请完成以下多步骤任务，最终目标是{{final_goal}}。

        输入与来源：{{inputs_sources}}。

        执行顺序：{{step_sequence}}。

        每一步保留：{{intermediate_outputs}}。

        边界条件：{{context_boundaries}}。

        判断与通过标准：{{decision_acceptance_rules}}。

        最终按{{final_output_contract}}交付。'
      learning_page_count: 7
