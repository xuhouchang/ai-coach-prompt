---
module:
  id: module2_crash_test
  name: Prompt Crash Test
  name_zh: Prompt 压力测试
  purpose: |
    Stress-test a Prompt under 3 adverse scenarios.
    Don't just rate the Prompt — see if it survives when
    conditions degrade. Output PASS/FAIL per scenario
    with root-cause attribution.
  audience: beginner
  scored: false
  estimated_time_minutes: 3
  trigger:
    entry: crash_test
    direct_mode: crash_test
    optional: true

scenarios:
  - id: missing_info
    label: Missing Key Information
    label_zh: 缺少关键信息
    description: |
      Simulate: a key variable is removed from the input.
      Does the Prompt define what to do when info is missing?
      Does it specify fallback assumptions?
    simulation: |
      Remove one critical input field (e.g., date range, target audience,
      data source). Ask: does the Prompt still guide the AI to produce
      a useful or at least safe output?
    pass_condition: |
      Prompt defines fallback behavior OR the missing field is
      non-critical (task can proceed with reasonable defaults).
    pass_condition_zh: |
      Prompt 定义了兜底行为，或缺失的字段非关键（任务可用合理默认值继续）。
    fail_reason_mapping:
      target_dimension: input_definition
      explanation: |
        When key information is missing and no fallback is specified,
        the AI will either hallucinate data or refuse to proceed.
        The Prompt does not survive missing input.
      explanation_zh: |
        关键信息缺失且没有兜底定义时，AI 要么编造数据，要么拒绝执行。
        这个 Prompt 在信息缺失时不稳定。
    robustness_signal: input_definition

  - id: scale_change
    label: Input Scale Variation
    label_zh: 输入规模变化
    description: |
      Simulate: the input changes in scale — from 1 item to 100 items,
      from a short paragraph to a 10-page document.
      Does the Prompt's output contract scale gracefully?
    simulation: |
      Change the estimated input size by 10x. Ask: does the Prompt
      define output structure in a way that works for both 1 item
      and 100 items? (e.g., "for each item" vs. "summarize all")
    pass_condition: |
      Output contract is written in per-item / structured terms,
      not tied to a single-item assumption. Volume-independent.
    pass_condition_zh: |
      输出契约是逐项/结构化的，不依赖单一输入假设。与数据量无关。
    fail_reason_mapping:
      target_dimension: output_contract
      explanation: |
        If the output format assumes a fixed small scale (e.g.,
        "write one paragraph"), it breaks when input grows.
        The Prompt's output contract is scale-bound.
      explanation_zh: |
        如果输出格式假设了固定的小规模（如"写一段话"），
        输入变大时就会失效。Prompt 的输出契约被规模锁死了。
    robustness_signal: output_contract

  - id: target_change
    label: Output Target Variation
    label_zh: 输出目标变化
    description: |
      Simulate: the reader, format, or success criteria change.
      E.g., audience switches from "internal team" to "CEO".
      Does the Prompt parameterize the target, or is it hardcoded?
    simulation: |
      Change one output target dimension (audience, format, tone,
      depth, language). Ask: can the same Prompt structure handle
      the new target by just swapping parameters?
    pass_condition: |
      Task definition is parameter-like (target is explicit and
      separable), not hardcoded into the instruction flow.
    pass_condition_zh: |
      任务定义是可参数化的（目标是显式且可分离的），
      而非写死在指令流程中。
    fail_reason_mapping:
      target_dimension: [context_completion, acceptance_criteria]
      explanation: |
        If audience, format, or quality bar is baked into the
        instruction text (e.g., "write for my boss"), changing
        the target requires rewriting the entire Prompt.
        The Prompt is target-bound.
      explanation_zh: |
        如果受众、格式或质量标准被写死在指令中
        （如"写给我老板看"），换目标就需要重写整个 Prompt。
        这个 Prompt 被目标锁死了。
    robustness_signal: [context_completion, acceptance_criteria]

judgment:
  overall_rule: |
    If ANY scenario FAILs, overall result is FAIL.
    Only PASS when all 3 scenarios PASS.
    This is intentionally strict — a Prompt that only works
    under ideal conditions is not robust.
  overall_rule_zh: |
    任意一个场景 FAIL，整体就是 FAIL。
    只有全部 3 个 PASS 才 PASS。
    这是有意保持严格——只在理想条件下好用的 Prompt，不算真的好。

display_rules:
  hide_internal:
    - Do NOT show the simulation mechanics.
    - Do NOT show dimension mappings.
    - Only show: scenario name, PASS/FAIL icon, reason in plain language.
  pass_icon: "✅"
  fail_icon: "❌"
  cognitive_hook: |
    "A Prompt that only works in perfect conditions isn't a good Prompt.
    Real tasks have missing info, changing scale, evolving targets.
    If your Prompt can't handle that, it's not the task spec it should be."
  cognitive_hook_zh: |
    "只在完美条件下好用的 Prompt，不算好 Prompt。
    真实任务会有信息缺失、规模变化、目标调整。
    如果 Prompt 扛不住这些，它就不是合格的任务规格书。"

output_template:
  zh: |
    ## Prompt 压力测试报告
    
    | 测试场景 | 结果 | 说明 |
    |----------|------|------|
    | 缺少关键信息 | {result_1} | {reason_1} |
    | 输入规模变化 | {result_2} | {reason_2} |
    | 输出目标变化 | {result_3} | {reason_3} |
    
    **整体结果：{overall_result}**
    
    {cognitive_hook_zh}
