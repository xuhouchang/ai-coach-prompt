---
module:
  id: module3_upgrade_judgment
  name: Prompt → Workflow Judgment
  name_zh: 任务升级判断
  purpose: |
    Detect when a task exceeds single-Prompt capability.
    Instead of continuing to optimize the Prompt, redirect
    the learner to the appropriate capability tier:
    Workflow / Skill / MCP / Agent.
    This module bridges Prompt thinking to system thinking.
  audience: beginner
  scored: false
  estimated_time_minutes: 2
  trigger:
    entry: upgrade_judgment
    direct_mode: upgrade_judgment
    event_driven: true
    description: |
      Triggered automatically when the learner brings a task
      that hits any of the 4 boundary signals. Also available
      as a direct standalone mode.

signals:
  - id: multi_step
    label: Multi-Step Task
    label_zh: 多步骤任务
    detection:
      patterns:
        - sequential sub-tasks ("first... then... finally...")
        - multi-phase workflow
        - dependency chain
      patterns_zh:
        - 顺序子任务（"先...再...然后..."）
        - 多阶段流程
        - 依赖链
    exceeds_prompt_because: |
      A single Prompt tries to do everything at once in one turn.
      But multi-step tasks need intermediate outputs, validation
      gates, and branching — which requires a Workflow.
    exceeds_prompt_because_zh: |
      单条 Prompt 试图在一次对话中完成所有事情。
      但多步骤任务需要中间输出、验证关口和分支——
      这需要 Workflow。
    route_to: skill_workflow_l1_node_design
    route_label: Workflow
    route_label_zh: Workflow（工作流）

  - id: external_data
    label: External Data Dependency
    label_zh: 外部数据依赖
    detection:
      patterns:
        - needs real-time data (stock price, weather, API)
        - needs database lookup
        - needs file system access
        - "check the latest / look up / fetch / query"
      patterns_zh:
        - 需要实时数据（股价、天气、API）
        - 需要查数据库
        - 需要访问文件系统
        - "查一下最新的 / 拉取 / 查询"
    exceeds_prompt_because: |
      A Prompt alone can only use the model's training data.
      Real-time or external data needs a tool — which means
      MCP or a Skill with tool access.
    exceeds_prompt_because_zh: |
      单独的 Prompt 只能使用模型训练数据。
      实时或外部数据需要工具——这意味着 MCP 或带工具权限的 Skill。
    route_to: skill_mcp_l1_basics
    route_label: MCP
    route_label_zh: MCP（工具连接）

  - id: state_persistence
    label: State Persistence Required
    label_zh: 状态保存需求
    detection:
      patterns:
        - "remember this / save / store / persist"
        - "next time / continue from last time"
        - "keep track of / maintain history"
        - "session / user profile"
      patterns_zh:
        - "记住这个 / 保存 / 存储"
        - "下次 / 接着上次"
        - "跟踪 / 记录历史"
        - "会话 / 用户档案"
    exceeds_prompt_because: |
      A single Prompt is stateless — each call starts fresh.
      Tasks that need memory across sessions require Skill
      (with save/load) or an Agent with persistent state.
    exceeds_prompt_because_zh: |
      单条 Prompt 是无状态的——每次调用都是全新的。
      需要跨会话记忆的任务需要 Skill（带存储）或有状态的 Agent。
    route_to: skill_agent_l1_basics
    route_label: Skill / Agent
    route_label_zh: Skill / Agent（智能体）

  - id: multi_role
    label: Multi-Role Collaboration
    label_zh: 多角色协作
    detection:
      patterns:
        - "let A review B / have X check Y"
        - "user + admin + reviewer"
        - "multiple perspectives / different roles"
        - "approval flow / handoff"
      patterns_zh:
        - "让 A 审 B / 叫 X 检查 Y"
        - "用户 + 管理员 + 审阅者"
        - "多角度 / 不同角色"
        - "审批流程 / 交接"
    exceeds_prompt_because: |
      Multi-role tasks need independent reasoning from different
      perspectives, plus coordination. That requires an Agent
      with multi-role orchestration.
    exceeds_prompt_because_zh: |
      多角色任务需要不同视角的独立推理，再加协调。
      这需要能编排多角色的 Agent。
    route_to: skill_agent_l1_basics
    route_label: Agent
    route_label_zh: Agent（智能体）

evolution_chain:
  description: |
    The capability evolution from single Prompt to autonomous Agent.
    This is shown to the learner when ANY boundary signal fires.
  levels:
    - tier: prompt
      label: Prompt
      label_zh: Prompt
      icon: "📝"
      description: |
        A single task instruction — define one thing clearly,
        get one result back. This is the foundation.
      description_zh: |
        单条任务指令——把一件事说清楚，拿到一个结果。
        这是地基。
    - tier: workflow
      label: Workflow
      label_zh: Workflow
      icon: "🔗"
      description: |
        Chain multiple Prompts into a sequence with gates,
        branching, and intermediate validation.
      description_zh: |
        把多条 Prompt 串成序列，带关口、分支、中间验证。
    - tier: skill
      label: Skill
      label_zh: Skill
      icon: "🧩"
      description: |
        Package a capability with parameters, reusable across
        sessions. Can include tools and state.
      description_zh: |
        把能力封装成可参数化、跨会话复用的包。
        可包含工具和状态。
    - tier: agent
      label: Agent
      label_zh: Agent
      icon: "🤖"
      description: |
        Autonomous planning + tool use + multi-role coordination.
        The Agent decides how to solve, not just execute.
      description_zh: |
        自主规划 + 调用工具 + 多角色协调。
        Agent 自己决定怎么解决，而不只是执行。

display_rules:
  hide_internal:
    - Do NOT show detection patterns or internal signal definitions.
    - Do NOT show future course IDs.
    - >-
      Only show: which signals fired, why this exceeds Prompt, the evolution
      chain diagram, and what to learn next.
  cognitive_hook: |
    "Prompt is the foundation, not the ceiling.
    When a task outgrows a single Prompt, it's not because you
    wrote it wrong. It's because the task needs a bigger tool.
    That's the whole point of the next stage."
  cognitive_hook_zh: |
    "Prompt 是地基，不是天花板。
    当一条 Prompt 装不下任务时，不是你写错了——
    是任务需要更大的工具。
    这就是下一阶段学习的内容。"

output_template:
  zh: |
    ⚠️ **这个任务超出了单条 Prompt 的能力范围。**
    
    **触发信号：**
    {fired_signals}
    
    ---
    
    **能力演进链：**
    
    📝 Prompt   → 单条任务指令：把一件事说清楚
      ↓
    🔗 Workflow → 多步节点串联：把一串事按顺序跑
      ↓
    🧩 Skill    → 可复用能力封装：带参数、可反复调用
      ↓
    🤖 Agent    → 自主规划 + 调用工具 + 多角色协作
    
    ---
    
    **你的任务命中了：** {fired_signal_labels}
    
    **建议学习路径：**
    {learning_path}
    
    {cognitive_hook_zh}
