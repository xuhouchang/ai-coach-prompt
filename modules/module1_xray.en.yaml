---
module:
  id: module1_xray
  name: Prompt X-Ray
  name_zh: Prompt 可执行性扫描
  purpose: |
    Scan a user's Prompt across 5 dimensions of executability.
    Produce an Execution Readiness Score (0-100) and identify
    exactly what is missing in each dimension.
    This is NOT a quality score. It measures how much the AI
    must GUESS vs. how much is explicitly defined.
  audience: beginner
  scored: false
  estimated_time_minutes: 3
  trigger:
    entry: xray_scan
    direct_mode: xray_scan
    optional: true

dimensions:
  - id: task_clarity
    label: Task Clarity
    label_zh: 任务清晰度
    description: |
      Does the Prompt say WHAT to do, unambiguously?
      A clear task uses action verbs and defines the subject.
    weight: 12
    rubric_ref: task_clarity
    status_levels:
      - level: missing
        display: Missing
        display_zh: 缺失
        factor: 0.0
        signal: No action verb or vague scope
        signal_zh: 没有明确的动作词，或范围模糊
      - level: partial
        display: Partial
        display_zh: 部分
        factor: 0.5
        signal: Has action but scope is ambiguous
        signal_zh: 有动作但范围不明确
      - level: complete
        display: Complete
        display_zh: 完整
        factor: 1.0
        signal: Unambiguous verb + defined subject/scope
        signal_zh: 动词明确 + 对象/范围已定义
    risk_when_missing: |
      AI may do the wrong thing, do too much, or do too little.
    risk_when_missing_zh: |
      AI 可能做错事、做太多、或做得太少。

  - id: input_definition
    label: Input Completeness
    label_zh: 输入完整性
    description: |
      Is the input data specified? Format, source, example?
    weight: 13
    rubric_ref: input_definition
    status_levels:
      - level: missing
        display: Missing
        display_zh: 缺失
        factor: 0.0
        signal: No input data mentioned
        signal_zh: 未提供任何输入数据
      - level: partial
        display: Partial
        display_zh: 部分
        factor: 0.5
        signal: Input mentioned but format/source unclear
        signal_zh: 提到了输入但格式/来源不清
      - level: complete
        display: Complete
        display_zh: 完整
        factor: 1.0
        signal: Input format, source, and example provided
        signal_zh: 输入格式、来源、示例已提供
    risk_when_missing: |
      AI will hallucinate input or misinterpret your data structure.
    risk_when_missing_zh: |
      AI 会自己编造输入数据，或误读你的数据结构。

  - id: context_completion
    label: Context Completeness
    label_zh: 上下文完整性
    description: |
      Who is the audience? What is the use case?
      What background matters?
    weight: 13
    rubric_ref: context_completion
    status_levels:
      - level: missing
        display: Missing
        display_zh: 缺失
        factor: 0.0
        signal: No audience, scenario, or background
        signal_zh: 未说明受众、场景或背景
      - level: partial
        display: Partial
        display_zh: 部分
        factor: 0.5
        signal: Audience implied but not explicit
        signal_zh: 受众可推断但不明确
      - level: complete
        display: Complete
        display_zh: 完整
        factor: 1.0
        signal: Audience, scenario, and tone defined
        signal_zh: 受众、场景、语气已明确
    risk_when_missing: |
      Output will be generic, tone-deaf, or miss the real need.
    risk_when_missing_zh: |
      输出会千篇一律，语气不对，偏离真实需求。

  - id: output_contract
    label: Output Contract
    label_zh: 输出契约
    description: |
      Is the expected output structure, format, and content specified?
    weight: 15
    rubric_ref: output_contract
    status_levels:
      - level: missing
        display: Missing
        display_zh: 缺失
        factor: 0.0
        signal: No output format or structure defined
        signal_zh: 没有定义输出格式或结构
      - level: partial
        display: Partial
        display_zh: 部分
        factor: 0.5
        signal: Format hinted but not structured
        signal_zh: 暗示了格式但没有结构化
      - level: complete
        display: Complete
        display_zh: 完整
        factor: 1.0
        signal: Format + structure + example output given
        signal_zh: 格式 + 结构 + 输出示例已提供
    risk_when_missing: |
      AI will pick a random format. You get what you get.
    risk_when_missing_zh: |
      AI 会随机选择格式。你拿到什么全看运气。

  - id: acceptance_criteria
    label: Acceptance Criteria
    label_zh: 验收标准
    description: |
      What makes the output good enough?
      Are constraints, quality bars, or success metrics defined?
    weight: 17
    rubric_ref: acceptance_criteria
    status_levels:
      - level: missing
        display: Missing
        display_zh: 缺失
        factor: 0.0
        signal: No quality standard or constraint
        signal_zh: 没有任何质量标准或约束
      - level: partial
        display: Partial
        display_zh: 部分
        factor: 0.5
        signal: Vague quality words ("good", "detailed")
        signal_zh: 用了模糊评价词（"好"、"详细"）
      - level: complete
        display: Complete
        display_zh: 完整
        factor: 1.0
        signal: Concrete constraints with measurable yardsticks
        signal_zh: 具体约束 + 可衡量的标准
    risk_when_missing: |
      AI output passes no bar. You can't tell if it's done.
    risk_when_missing_zh: |
      AI 输出没有及格线。你不知道它算不算"做好了"。

scoring:
  formula: |
    Execution Readiness Score = 
      SUM( weight_i × status_factor_i ) / SUM( weight_i ) × 100
    
    status_factor: complete=1.0, partial=0.5, missing=0.0
    Max possible: 100 (all dimensions complete)
    Min possible: 0 (all dimensions missing)
  tiers:
    - range: [90, 100]
      label: Executable
      label_zh: 可执行
      meaning: The Prompt defines a task the AI can execute with minimal guessing.
      meaning_zh: 这个 Prompt 定义的任务，AI 几乎不需要猜测就能执行。
    - range: [60, 89]
      label: Partially Executable
      label_zh: 有缺口，需补槽位
      meaning: The task is mostly defined but has gaps the AI will fill with guesses. This readiness score is separate from the final scored rubric; a score below 75 still triggers a required retry.
      meaning_zh: 任务大部分已定义，但有缺口，AI 会用猜测填补。注意：这是“执行就绪”诊断分，与正式评分不是同一把尺——正式评分低于 75 即需重做。
    - range: [0, 59]
      label: Needs Definition
      label_zh: 未充分定义
      meaning: The AI must guess extensively. Output quality will be unpredictable.
      meaning_zh: AI 必须大量猜测。输出质量不可预测。

display_rules:
  hide_internal:
    - Do NOT show weights or factor values to the user.
    - Do NOT show the raw formula or calculation steps.
    - Only show: dimension name, status (color-coded), risk, and the final Score.
  color_coding:
    complete: green checkmark
    partial: yellow warning
    missing: red cross
  cognitive_hook: |
    "The score isn't about your writing skills. It's about how much of the
    task you've actually defined. Every red mark is a gap the AI must fill
    with a blind guess."
  cognitive_hook_zh: |
    "分数不反映你的文笔，反映的是任务被定义了多少。
    每个红色标记，都是一道 AI 必须瞎猜的空。"

output_template:
  zh: |
    ## Prompt X-Ray 扫描报告
    
    **执行就绪分：{score}/100 — {tier_label}**
    
    | 维度 | 状态 | 风险 |
    |------|------|------|
    | 任务清晰度 | {task_status} | {task_risk} |
    | 输入完整性 | {input_status} | {input_risk} |
    | 上下文完整性 | {context_status} | {context_risk} |
    | 输出契约 | {output_status} | {output_risk} |
    | 验收标准 | {acceptance_status} | {acceptance_risk} |
    
    {cognitive_hook_zh}
